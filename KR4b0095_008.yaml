body:
  text: 卷八改封陳王謝恩章臣既弊陋守國無效自分出削以彰眾誡不意天恩滂霈潤澤橫流猥蒙加封茅土既優爵賞必重非臣虛淺所宜奉受非臣灰身所能報答封二子為公謝恩章詔書封臣息男苗為高陽鄉公志為穆鄉公臣伏自惟文無升堂廟勝之功武無摧鋒接刃之效天時運幸得生貴門遇以親戚少荷光寵竊位列侯榮曜當世顧影慚形流汗反側洪恩罔極雲雨增加既榮本榦枝葉并蒙苗志小豎既頑且稚猥荷列爵並佩金紫施崇所加惠及父子初封安鄉侯表初封安鄉侯表臣抱罪即道憂惶恐怖不知刑罪當所限齊陛下哀愍臣身不聽有司所執待之過厚即日於延津受安鄉侯印綬奉詔之日且懼且悲懼于不脩始違憲法悲於不慎速此貶退上增陛下垂念下遺太后見憂臣自知罪深責重受恩無量精魄飛散忘軀殞命謝妻改封表謝妻改封表璽書今以東阿王妃為陳王妃並下印綬因故上前所假印以其拜授書以即日到臣輒奉詔拜其才質底下謬同受私遇寵素餐臣為其首陛下體乾坤育物之德東海含容之大乃復隨例顯封大國光揚章灼非臣負薪之才所宜克當非臣穢釁所宜蒙獲夙夜憂歎念報罔極洪施遂隆既榮枝榦猥復正臣妃為陳妃光耀宣朗非妾婦惷愚所當蒙被葵藿草物猶感恩養況臣含氣銜珮弘惠歿而後已誠非翰墨屢辭所能報答自試表自試表臣聞士之羡永生者非徒以甘食麗服宰割萬物而已將有以補益群生尊主惠民使功存於竹帛名光於後嗣今臣文不昭於俎豆武不習於干戈而竊位藩王施祿東夏消損天日無益聖朝淮南尚有山竄之賊吳會猶有潛江之虜使戰士未獲歸於農畝五兵未得收於武庫蓋善論者不恥謝善戰者不羞去夫凌雲者泥蟠者也後申者先屈者也是以神龍以為德尺蠖以求申昔湯事葛文王事犬夷固仁者能以大事小若陛下遣明哲之使繼能陸賈之蹤者使之江南發愷悌之詔張日月之信開以降路權必奉承聖化斯不疑也求自試表二首臣植言臣聞士之生世入則事父出則事君事父尚於榮親事君貴於興國故慈父不能愛無益之子仁君不能畜無用之臣夫論德而授官者成功之君也量能而受爵者畢命之臣也故君無虛授臣無虛受虛授謂之謬舉虛受謂之尸祿詩之素餐所由作也昔二虢不辭兩國之任其德厚也旦奭不讓燕魯之封其功大也今臣蒙國重恩三世于今矣正值陛下升平之際沐浴聖澤潛潤德教可謂厚幸矣而位竊東藩爵在上列身被輕煖口厭百味目極華靡耳倦絲竹者爵重祿厚之所致也退念古之受爵祿者有異于此皆以功勤濟國輔主惠民今臣無德可述無功可紀若此終年無益國朝將挂風人彼己之譏是以上慚玄冕俯愧朱紱方今天下一統九州晏如顧西尚有違命之蜀東有不臣之吳使邊境未得稅甲謀士未得高枕者誠欲混同宇內以致太和也故啟滅有扈而夏功昭成克商奄而周德著今陛下以聖明統世將欲卒文武之功繼成康之隆簡良授能以方叔邵虎之臣鎮衛四境為國爪牙者可謂當矣然而高鳥未挂於輕繳淵魚未懸於鉤餌者恐釣射之術或未盡也昔耿弇不俟光武亟擊張步言不以賊遺於君父也故車右伏劍於明轂雍門刎首於齊境若此二子豈惡生而尚死哉誠忿其慢主而凌君也夫君之寵臣欲以除患興利臣之事君必以殺身靜亂以功報主也昔賈誼弱冠求試屬國請係單于之頸而制其命終軍以妙年使越欲得長纓占其王羈致北闕此二臣者豈好為夸主而曜世俗哉志或鬱結欲逞其才力輸能於明君也昔漢武為霍去病治第辭曰匈奴未滅臣無以家為夫憂國忘家損軀濟難忠臣之志也今臣居外非不厚也而寢不安席食不遑味者伏以二方未剋為念伏見先帝武臣宿兵年耆即世者有聞矣雖賢不乏世宿將舊卒由習戰也竊不自量志在授命庶立毛髮之功以報所受之恩若使陛下出不世之詔效臣錐刀之用使得西屬大將軍當一校之隊若東屬大司馬統偏師之任必乘危蹈險騁舟奮驪突刃觸鋒為士卒先雖未能擒權馘亮庶將虜其雄率殲其醜類必效須臾之捷以滅終身之愧使名掛史筆事列朝策雖身分蜀境首懸吳闕猶生之年也如微才弗試沒世無聞徒榮其軀而豐其體生無益於事死無損於數虛荷上位而忝重祿禽息鳥視終於白首此徒圈牢之養物非臣之所志也流聞東軍失備師徒小衂輟食忘餐奮袂攘衽撫劍東顧而心已馳於吳會矣臣昔從先武皇帝南極赤岸東臨滄海西望玉門北出玄塞伏見所以行師用兵之勢可謂神妙也故兵者不可豫言臨難而制變者也志欲自效於明時立功於聖世每覽史籍觀古忠臣義士出一朝之命以狥國家之難身雖屠裂而功名著於景鍾名績垂於竹帛未嘗不撫心而歎息也臣聞明主使臣不廢有罪故奔北敗軍之將用而秦魯以成其功絕纓盜馬之臣赦而楚趙以濟其難臣竊感先帝早崩威王棄世臣獨何人以堪長久常恐先朝露填溝壑墳土未乾而身名並滅臣聞騏驥長鳴則伯樂昭其能盧狗悲號則韓國知其才是以效之齊楚之路以逞千里之任試之狡兔之捷以驗搏噬之用今臣志狗馬之微功竊自惟度終無伯樂韓國之舉是以於悒而竊自痛者也夫臨博而企竦聞樂而竊抃者或有賞音而識道也昔毛遂趙之陪隸猶假錐囊之喻以寤主立功何況巍巍大魏多士之朝而無慷慨死難之臣乎夫自衒自媒者士女之醜行也干時求進者道家之明忌也而臣敢陳聞於陛下者誠與國分形同氣憂患共之者也冀以塵霧之微補益山海熒燭末光增輝日月是以敢冒其醜而獻其忠必知為朝士所笑聖主不以人廢言伏惟陛下少垂神聽臣則幸矣又五帝之世非皆智三季之末非皆愚用與不用知與不知也夫相者文德昭者也將者武功烈者也文德昭則可以匡國朝敘百揆稷契夔龍是矣武功烈則可以征不庭廣邦境南仲方叔是也昔伊尹之為媵臣至賤也呂尚之處漁釣至陋也及其見舉湯文誠合志同豈復假近習之薦因左右之介哉發騏驥於吳可謂困矣及其伯樂相之孫子遇之形體不勞而坐取千里伯樂善御馬明君善御臣誠任賢使能之明效也昔叚干木脩德於閭閻師秦為之輟攻而文侯以安穰苴授節於邦境燕晉為之退師而景公無患皆簡德尊賢之所致也願陛下垂高宗傅嵓之明以顯中興之功謝賜柰表謝賜柰表即夕殿中虎賁宣詔賜臣等冬柰一奩詔使溫啖夜非食時而賜見及柰以夏熟今則冬生物以非時為珍恩以絕口為厚實非臣等所宜荷之諫伐遼東表臣伏以遼東負阻之國勢便形固帶以遼海今輕車遠攻師疲力屈彼有其備所謂以逸待勞以飽待饑者也以臣觀之誠未易攻也若國家攻之而必克屠襄平之城懸公孫之首得其地不足以償中國之費虜其民不足以補三軍之失是我所獲不如所喪也若其不拔曠日持久暴師於野然天時不測水濕無常彼我之兵連於城下進則有高城深池無所施其功退則有歸途不通道路瀸洳東有待釁之吳西有伺隙之蜀吳起東南則荊楊騷動蜀應西境則雍涼三分兵不解於外民罷困于內促耕不解其飢疾蠶不救其寒夫渴而後穿井飢而後殖種可以圖遠難以應卒也臣以為當今之務在於省徭役薄賦斂勤農桑三者既備然後令伊管之臣得施其術孫吳之將得奮其力若此則太平之基可立而待康哉之歌可坐而聞曾何憂於二敵何懼於公孫乎今不息邦畿之內而勞神於蠻貊之域竊為陛下不取也獻璧表臣聞玉不隱瑕臣不隱情伏知所進非和氏之璞萬國之幣璧為充貢伏知車駕或出可祈以建榮曰主路臣每馳心豹尾獻文帝馬表獻文帝馬表臣於先武皇帝世得大宛紫騂馬一疋形法應圖善持頭尾教令習拜今輒已能又能行與鼓節相應謹以表奉獻上牛表上牛表臣聞物以洪珍細亦或貴故不見僬僥之微不知泱漭之泰不見果下之乘不別龍馬之大高下相懸所以致觀也謹奉牛一頭不足追遵大小之制形少有殊敢不獻上謝鼓吹表許以簫管之樂榮以田游之嬉陛下仁重有虞恩過周旦濟世安宗實在聖德求通親親表臣植言臣聞天稱其高者以無不覆地稱其廣者以無不載日月稱其明者以無不照江海稱其大者以無不容故孔子曰大哉堯之為君惟天為大惟堯則之夫天德之於萬物可謂弘廣矣蓋堯之為教先親後疏自近及遠其傳曰克明峻德以親九族九族既睦平章百姓及周之文王亦崇厥化其詩曰刑于寡妻至于兄弟以御于家邦是以雍雍穆穆風人詠之昔周公弔管蔡之不咸廣封懿親以藩屏王室傳曰周之宗盟異姓為後誠骨肉之恩爽而不離親親之義寔在敦固未有義而後其君仁而遺其親者也伏惟陛下資帝唐欽明之德體文王翼翼之仁惠洽椒房恩昭九親群臣百僚番休遞上執政不廢於公朝下情得展於私室親理之路通慶弔之情展誠可謂恕己治人推惠施恩者矣至於臣者人道絕緒禁固明時臣切自傷也不敢乃望交氣類脩人事敘人倫近且婚媾不通兄弟永絕吉凶之問塞慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越今臣以一切之制永無朝覲之望至於注心皇極結情紫闥神明知之矣然天實為之謂之何哉退省諸王常有戚戚具爾之心願陛下沛然垂詔使諸國慶問四節得展以敘骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺歲得再通齊義於貴宗等惠於百司如此則古人之所歎風雅之所詠復存於聖世矣臣伏自惟省豈無錐刀之用及觀陛下之所拔授若以臣為異姓竊自料度不後於朝士矣若得辭遠遊戴武弁解朱組佩青紱駙馬奉車趣得一號安宅京室執鞭珥筆出從華蓋入侍輦轂承答聖問拾遺左右乃臣丹情之至願不離於夢想者也遠慕鹿鳴君臣之宴中詠棠棣匪他之誡下思伐木友生之義終懷蓼莪罔極之哀每四節之會塊然獨處左右唯僕隸所對唯妻子高談無所與陳發義無所與展未嘗不聞樂而拊心臨觴而歎息也臣伏以為犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心況徒虛語耳若葵藿之傾葉太陽雖不為之迴光然終向之者誠也臣竊自比葵藿若降天地之施垂三光之明者實在陛下臣聞文子曰不為福始不為禍先今之否隔友于同憂而臣獨唱言者何也竊不願於聖代使有不蒙施之物有不蒙施之物必有慘毒之懷故柏舟有天只之怨谷風有棄予之嘆伊尹恥其君不為堯舜孟子曰不以舜之所以事堯事其君者不敬其君者也臣之愚蔽固非虞伊至於欲使陛下崇光被時雍之美宣緝熙章明之德者是臣慺慺之誠竊所獨守實懷鶴立企佇之心敢復陳聞者冀陛下儻發天聰而垂神聽也慶文帝受禪章陛下以聖德龍飛順天革命允答神符誕作民主乃祖先后積德累仁世濟其美以暨於先王勤恤民隱劬勞勠力以除其害經營四方不遑啟處是用隆茲福慶光啟于魏下承統業贊戎前緒克廣德音綏靜內外紹先周之舊跡襲文武之懿德保大定功海內為一豈不休哉慶文帝受禪章慶文帝受禪章陛下以明聖之德受天顯命良辰即祚以臨天下洪化宣流洋溢宇內是以普天率土莫不承風欣慶執贄奔走奉賀闕下況臣親體至戚懷歡踊躍上卞太后誄表大行太皇后資坤元之性體載物之仁齊美姜嫄等德任姒佐政內朝惠加四海草木荷恩含氣受潤庶鍾元吉承育萬祚何圖一旦早棄明朝背絕臣庶悲痛靡告臣聞名以述德誄尚及哀是以冒越諒闇之禮作誄一篇知不足讚揚名貴以展臣蓼莪之思憂荒情散不足觀采晉左九嬪上元皇后誄表曰伏惟聖善宣慈仁洽六宮含弘光大德潤四海竊聞之前志卑不誄尊少不誄長揚雄臣也而誄漢后班固子也而誄其父皆以述楊景行顯之竹帛豈所謂三代不同禮隨時而作者乎黃初五年令黃初五年令令夫遠不可知者天也近不可知者人也傳曰知人則哲堯猶病諸諺曰人心不同若其面焉唯女子與小人為難養也近之則不遜遠之則怨詩云憂心悄悄慍于群小自世間人從或受寵而背恩或無故而入叛違顧左右曠然無信大嚼者咋斷其舌右手執斧左手執鉞傷夷一身之中尚有不可信況於人乎唯無深瑕潛釁隱過匿愆乃可以為人君上行刀鋸於左右耳前後無其人也諺曰穀千駑不如養一驢又曰穀駑養虎大無益也乃知韓昭侯之使藏弊袴良有以也使臣有三品有可以仁義化者有可以恩惠驅者此二者不足以導之則當以刑罰使之刑罰復不足以率之則明聖所以不畜故唐堯至仁不能容無益之子湯武至聖不能養無益之臣九折臂知為良醫吾知所以待下矣諸吏各敬爾在位孤推一概之平功之宜賞於疏必與罪之宜戮在親不赦此令之行有若皎日於戲群臣其覽之哉又黃初六年令曰吾昔以信人之心無忌於左右深為東郡太守王機防輔吏倉輯等任所誣白獲罪聖朝身輕於鴻毛而謗重於泰山賴蒙帝主天地之仁違百師之典議舍三千之首戾反我舊居襲我初服雲雨之施焉有量哉反旋在國揵門退掃形景相守出入二載機等吹毛求瑕千端萬緒然終無可言者及到雍又為監官所舉亦以紛若於今復三年矣然卒歸不能有病於孤者信心足以貫於神明也昔熊渠李廣武發石開鄒子囚燕中夏霜下杞妻哭梁山為之崩固精神可以動天地金石何況於人乎今皇帝遙過鄙國曠然大赦與孤更始欣笑和樂以歡孤隕涕咨嗟以悼孤豐賜光厚訾重千金損乘輿之副竭中黃之府名馬充廄驅牛塞路孤以何德而當斯惠孤以何功而納斯貺富而不吝寵至不驕者則周公其人也孤小人爾身更以榮為戚何者將恐簡易之尤出於細微脫爾之愆一朝復露也故欲修吾往業守吾初志欲使皇帝恩在摩天使孤心常存入地將以全陛下厚德究孤犬馬之年此難能也然孤固欲行眾人之所難詩曰德輶如毛人鮮克舉之此之謂也故為此令著於宮門欲使左右共觀志焉上責躬詩表上責躬詩表臣植言臣自抱釁歸蕃刻肌刻骨追思罪戾晝分而食夜分而寢誠以天網不可重罹聖恩難可再恃切感相鼠之篇無禮遄死之義形影相弔五情愧赧以罪棄生則違古賢夕改之勸忍垢苟全則犯詩人胡顏之譏伏惟陛下德象天地恩隆父母施暢春風澤如時雨是以不別荊棘者慶雲之惠也七子均養者鳲鳩之仁也舍罪責功者明君之舉也矜愚愛能者慈父之恩也是以愚臣徘徊於恩澤而不敢自棄者也前奉詔書臣等絕朝心離志絕自分黃耇永無執圭之望不圖聖詔猥垂齒召至止之日馳心輦轂僻處西館未奉闕庭踊躍之懷瞻望反側不勝犬馬戀主之情謹拜表並獻詩二首詞旨淺末不足採覽貴露下情冒顏以聞龍見表龍見表臣聞鳳凰復見於鄴南黃龍雙出於清泉聖德至理以致嘉瑞將棲鳳於林囿豢龍於陂池為百姓旦夕之所觀冬至獻襪頌表冬至獻襪頌表伏見舊儀國家冬至獻履貢襪所以迎福踐長先臣或為之頌臣既玩其嘉藻願述朝慶千載昌期一陽嘉節四方交泰萬物昭蘇亞歲迎祥履長納慶不勝感節情繫帷幄拜表奉賀並獻紋履七量襪若干副茅茨之陋不足以入金門登玉臺也上獻以聞謹獻上先帝賜鎧表上先帝賜鎧表先帝賜臣鎧黑光明光各一領兩當鎧一領環鎖鎧一領馬鎧一領今代以昇平兵革無事乞悉以付鎧曹自理
