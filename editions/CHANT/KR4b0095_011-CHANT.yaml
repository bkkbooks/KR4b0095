body:
  text: 附錄述行賦尋曲路之南隅觀秦政之驪墳哀黔首之罹毒酷始皇之為君濯余身於神井偉湯液之若焚恨西夏之不綱七步詩煮豆然豆萁漉豉以為汁萁在釜下然豆在釜中泣本是同根生相煎何太急離別詩人遠精神近寤寐夢容光失題雙鶴俱遨遊相失東海旁雄飛竄北朔雌驚赴南湘棄我交頸歡離別各異方不惜萬里道但恐天網張曹植詩一顧千金重何必珠玉錢鞞舞歌漢靈帝西園鼓吹有李堅者能鞞舞遭亂西隨段熲先帝聞其舊有技召之堅既中廢兼古曲多謬誤異代之文未必相襲故依前曲改作新歌五篇不敢充之黃門近以成下國之陋樂焉聖皇篇聖皇應曆數正康帝道休九州咸賓服威德洞八幽三公奏諸公不得久淹留藩位任至重舊章咸率由侍臣有文奏陛下體仁慈沈吟有愛戀不忍聽可之迫有官典憲不得顧恩私諸王當就國璽綬何累縗便時舍外殿宮省寂無人主上增顧念皇母懷苦辛何以為贈賜傾府竭寶珍文錢百億萬采帛若烟雲乘輿服御物錦羅與金銀龍旂垂九旒羽蓋參班輪諸王自計念無功荷厚德思一效筋力糜軀以報國鴻臚擁節衛副使隨經營貴戚並出送夾道交輜軿車服齊整設韡曄耀天精武騎衛前後鼓吹簫笳聲祖道魏東門淚下霑冠纓扳蓋因內顧俛仰慕同生行行日將暮何時還闕庭車輪為徘徊四馬躊躇鳴路人尚酸鼻何況骨肉情靈芝篇靈芝生天地朱草被洛濱榮華相晃耀光采曄若神古時有虞舜父母頑且嚚盡孝於田壟烝烝不違仁伯瑜年七十綵衣以娛親慈母笞不痛歔欷涕霑巾丁蘭少失母自傷早孤煢刻木當嚴親朝夕致三牲暴子見陵侮犯罪以亡形丈人為泣血免戾全其名董永遭家貧父老財無遺舉假以供養傭作致甘肥責家填門至不知何用歸天靈感至德神女為秉機歲月不安居嗚呼我皇考生我既已晚棄我何其早蓼莪誰所興念之令人老退詠南風詩灑淚滿褘抱亂曰聖皇君四海德教朝夕宣萬國咸禮讓百姓家肅虔庠序不失儀孝弟處中田戶有曾閔子比屋皆仁賢髫齔無夭齒黃髮盡其年陛下三萬歲慈母亦復然大魏篇大魏應靈待天祿方甫始聖德致泰和神明為驅使左右為供養中殿宜皇子陛下長壽考群臣拜賀咸悅喜積善有餘慶寵祿固天常眾喜填門至臣子蒙福祥無患及陽遂輔翼我聖皇眾吉咸集會凶邪姦惡並滅亡黃鵠游殿前神鼎周四阿玉馬充乘輿芝蓋樹九華白虎戲西除舍利從辟邪騏驥躡足舞鳳皇拊翼歌豐年大置酒玉樽列廣庭樂飲過三爵朱顏暴已形式宴不違禮君臣歌鹿鳴樂人舞鼙鼓百官雷抃讚若驚儲禮如江海積善若陵山皇嗣繁且熾孫子列曾玄群臣咸稱萬歲陛下長壽樂年御酒停未飲貴戚跪東廂侍人承顏色奉進金玉觴此酒亦真酒福祿當聖皇陛下臨軒笑左右咸歡康杯來一何遲群僚以次行賞賜累千億百官並富昌精微篇精微爛金石至心動神明杞妻哭死夫梁山為之傾子丹西質秦烏白馬角生鄒衍囚燕市繁霜為夏零關東有賢女自字蘇來卿壯年報父仇身沒垂功名女休逢赦書白刃幾在頸俱上列仙籍去死獨就生太倉令有罪遠徵當就拘自悲居無男禍至無與俱緹縈痛父言荷擔西上書盤桓北闕下泣淚何漣如乞得並姊弟沒身贖父軀漢文感其義肉刑法用除其父得以免辯義在列國多男亦何為一女足成居簡子南渡河津吏廢舟船執法將加刑女娟擁櫂前妾父聞君來將涉不測淵長懼風波起禱祝祭名川備禮饗神祇為君求福先不勝釂祀誠教令犯罰艱君必欲加誅乞使知罪愆妾願以身代至誠感蒼天國君高其義其父用赦原河激奏中流簡子知其賢歸聘為夫人榮寵超後先辯女解父命何況健少年黃初發和氣明堂德教施治道致太平禮樂風俗移刑措民無枉怨女復何為聖皇長壽考景福常來儀孟冬篇孟冬十月陰氣厲清武官誡田講旅統兵元龜襲吉元光著明蚩尤蹕路風弭雨停乘輿啟行鸞鳴幽軋虎賁采騎飛象珥鶡鐘鼓鏗鏘簫管嘈喝萬騎齊鑣千乘等蓋夷山填谷平林滌藪張羅萬里盡其飛走趯趯狡兔揚白跳翰獵以青骹掩以脩竿韓盧宋鵲呈才騁足噬不盡緤牽麋掎鹿魏氏發機養基撫弦都盧尋高搜索猴猿慶忌孟賁蹈谷超巒張目決眥髮怒穿冠頓熊扼虎蹴豹摶貙氣有餘勢負象而趨獲車既盈日側樂終罷役解徒大饗離宮亂曰聖皇臨飛軒論功校獵徒死禽積如京流血成溝渠明詔大勞賜大官供有無走馬行酒醴驅車布肉魚鳴鼓舉觴爵擊鍾釂無餘絕綱縱麟麑弛罩出鳳雛收功在羽校威靈振鬼區陛下長歡樂永世合天符棄婦篇棄婦篇石榴植前庭綠葉搖縹青丹華灼烈烈璀采有光榮光榮曄流離可以處淑靈有鳥飛來集拊翼以悲鳴悲鳴夫何為丹華實不成拊心長歎息無子當歸寧有子月經天無子若流星天月相終始流星沒無精棲遲失所宜下與瓦石并憂懷從中來歎息通雞鳴反側不能寐逍遙於前庭踟躕還入房肅肅帷幕聲搴帷更攝帶撫絃調鳴箏慷慨有餘音要妙悲且清收淚長歎息何以負神靈招搖待霜露何必春夏成晚穫為良實願君安且寧長歌行墨出青松之煙筆出狡兔之翰古人感鳥迹文字有改判苦熱行行遊到日南經歷交趾鄉苦熱但暴露越夷水中藏結客篇結客少年場報怨洛北荒利劍手中鳴一擊兩尸僵陌上桑望雲際有真人安得輕舉繼清塵執電鞭馳飛麟天地篇俱為時所拘羈紲作微臣樂府歌膠漆至堅浸之則離皎皎素絲隨染色移君不我棄讒人所為樂府市肉取肥沽酒取醇交觴接杯以致殷勤樂府歌詞所齎千金之寶劍通犀文玉間碧璵翡翠飾雞璧標首明月珠樂府歌巢許蔑四海商賈爭一錢制命宗聖侯孔羨奉家祀碑維黃初元年大魏受命胤軒轅之高縱紹虞氏之遐統應歷數以改物揚仁風以作教於是揖五瑞班宗彝鈞衡石同度量秩群祀於無文順天時以布化既乃緝熙聖緒紹顯上世追存二代三愘之禮兼紹宣尼褒成之後以魯縣百戶命孔子廿一世孫議郎孔羡為宗聖侯以奉孔子之祀制詔三公曰昔仲尼姿大聖之才懷帝王之器當衰周之末而無受命之運生乎魯衛之朝教化乎汶泗之上栖栖焉皇皇焉欲屈己以存道貶身以救世當時王公終莫能用乃追考五代之禮修素王之事因魯史而制春秋就太師而正雅頌俾千載之後莫不采其文以述作卬其聖以成謀咨可謂命世大聖億載之師表者已遭天下大亂百祀墮壞舊居之廟毀而不修褒成之後絕而莫繼闕里不聞講誦之聲四時不覩烝嘗之位斯豈所謂崇化報功盛德百世必祀者哉嗟乎朕甚閔焉其以議郎孔羡為宗聖侯邑百戶奉孔子之祀令魯郡修起舊廟置百戶卒吏以守衛之又於其外廣為屋宇以居學者於是魯之父老諸生遊士覩廟堂之始復觀俎豆之初設嘉聖靈於髣髴想貞祥之來集乃慨然而歎曰大道衰廢禮學滅絕卅餘年皇上懷仁聖之懿德兼二儀之化育廣大苞於無方淵恩淪於不測故自受命以來天人咸和神氣烟熅嘉瑞踵武休徵屢臻殊俗解編髮而慕義遐夷越險阻而來賓雖太皓游龍以君世虞氏儀鳳以臨民伯禹命玄宮而為夏后西伯由岐社而為周文尚何足稱於大魏哉若乃紹繼微絕興修廢官疇咨稽古崇配乾坤允神明之所福祚宇內之所歡欣也豈徒魯邦而已哉爾乃感殷人路寢之義嘉先民泮宮之事以為高宗僖公蓋嗣世之王諸侯之國耳猶著德於名頌騰聲乎千載況今聖皇肇造區夏創業垂統受命之日曾未下輿而褒崇大聖隆化如此能無頌乎乃作頌曰煌煌大魏受命溥將繼體黃虞含夏苞商降釐下土廓清三光群祀咸秩靡事不綱嘉彼玄聖有邈其靈遭世霿亂莫顯其榮褒成既絕寢廟斯傾闕里蕭條靡歆靡馨我皇悼之尋其世武乃建宗聖以紹厥後修復舊堂豐其甍宇莘莘學徒爰居爰處王教既備群小遄沮魯道以興永作憲矩洪聲豈遐神祇來和休徵雜遝瑞我邦家內光區域外被荒遐殊方重譯搏拊揚歌於赫四聖運世應期仲尼既沒文亦在茲彬彬我后越而五之並於億載如山之基禹治水贊嗟夫夏禹實勞水功西鑿龍門疏河道江梁岐既闢九州以同天錫玄圭奄有萬邦禹渡河贊禹濟於河黃龍負船舟人並懼禹歎仰天予受大運勤功恤民死亡命也龍乃弭身長樂觀畫贊妙哉平安君才巧若神辭賦之作華若望春古冶子等贊齊姜接子勇節徇名虎門之博忽晏置釁矜而曰伐輕死重分陳審舉表陳審舉表臣聞天地協氣而萬物生君臣合德而庶政成五帝之世非皆智三季之末非皆愚用與不用知與不知也既時有舉賢之名而無得賢之實必各援其類而進矣諺曰相門有相將門有將夫相者文德昭者也將者武功烈者也文德昭則可以匡國朝致雍熙稷契夔龍是也武功烈則可以征不庭威四夷南仲方叔是矣昔伊尹之為媵臣至賤也呂尚之處屠釣至陋也及其見舉於湯武周文誠道合志同玄謨神通豈復假近習之薦因左右之介哉書曰有不世之君必能用不世之臣用不世之臣必能立不世之功殷周二王是矣若夫齷齪近步遵常守故安足為陛下言哉故陰陽不和三光不暢官曠無人庶政不整者三司之責也疆場騷動方隅內侵沒軍喪眾干戈不息者邊將之憂也豈可虛荷國寵而不稱其任哉故任益隆者負益重位益高者責益深書稱無曠庶官詩有職思其憂此其義也陛下體天真之淑聖登神機以繼統冀聞康哉之歌偃武行文之美而數年以來水旱不時民困衣食師徒之發歲歲增調加東有覆敗之軍西有殪沒之將至使蚌蛤浮翔於淮泗鼲鼬讙譁於林木臣每念之未嘗不輟食而揮餐臨觴而搤腕矣昔漢文發代疑朝有變宋昌曰內有朱虛東牟之親外有齊楚淮南琅邪此則磐石之宗願王勿疑臣伏惟陛下遠覽姬文二虢之援中慮周成召畢之輔下存宋昌磐石之固昔騏驥之於吳坂可謂困矣及其伯樂相之孫郵御之形體不勞而坐取千里蓋伯樂善御馬明君善御臣伯樂馳千里明君致太平誠任賢使能之明效也若朝司惟良萬機內理武將行師方難克弭陛下可得雍容都城何事勞動鑾駕暴露於邊境哉臣聞羊質虎皮見草則悅見豺則戰忘其皮之為虎也今置將不良有似於此故語曰患為之者不知知之者不得為也昔樂毅奔趙心不忘燕廉頗在楚思為趙將臣生乎亂長乎軍又數承教於武皇帝伏見行師用兵之要不必取孫吳而闇與之合竊揆之於心常願得一奉朝覲排金門蹈玉陛列有職之臣賜須臾之問使臣得一散所懷攄舒蘊積死不恨矣被鴻臚所下發士息書期會甚急又聞豹尾已建戎軒騖駕陛下將復勞玉躬擾掛神思臣誠竦息不遑寧處願得策馬執鞭首當塵露撮風后之奇接孫吳之要追慕卜商起予左右效命先軀畢命輪轂雖無大益冀有小補然天高聽遠情不上通徒獨望青雲而拊心仰高天而歎息耳屈平曰國有驥而不知乘焉皇皇而更索昔管蔡放誅周召作弼叔魚陷刑叔向匡國三監之釁臣自當之二南之輔求不必遠華宗貴族藩王之中必有應斯舉者故傳曰無周公之親不得行周公之事惟陛下少留意焉近者漢氏廣建藩王豐則連城數十約則饗食祖祭而已未若姬周之樹國五等之品制也若扶蘇之諫始皇淳于越之難周青臣可謂知時變矣夫能使天下傾耳注目者當權者是矣故謀能移主威能懾下豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕蓋取齊者田族非呂宗也分晉者趙魏非姬姓也惟陛下察之苟吉專其位凶離其患者異姓之臣也欲國之安祈家之貴存共其榮沒同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉臣聞孟子曰君子窮則獨善其身達則兼善天下今臣與陛下踐冰履炭登山浮澗寒溫燥溼高下共之豈得離陛下哉不勝憤懣拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事或可思若有毫釐少掛聖意者乞出之朝堂使夫博古之士糾臣表之不合義者如是則臣願足矣昔段干木修德於閭閻秦師為之輟攻而文侯以安穰苴授節於邦境燕晉為之退師而景公無患皆簡德尊賢之所致也願陛下垂高宗傅巖之明以顯中興之功封鄄城王謝表臣愚駑垢穢才質疵下過受陛下日月之恩不能摧身碎首以答陛下厚德而狂悖發露始干天憲自分放棄抱罪終身苟貪視息無復睎幸不悟聖恩爵以非望枯木生葉白骨更肉非臣罪戾所當宜蒙俯仰慚惶五內戰悸奉詔之日悲喜參至雖因拜章陳答聖恩下情未展轉封東阿王謝表奉詔太皇太后念雍丘下溼少桑欲轉東阿當合王意可遣人按行知可居不奉詔之日伏增悲喜臣以無功虛荷國恩爵尊祿厚用無益於時脂車秣馬志在黜放不圖陛下天父之恩猥宣皇太后慈母之念遷之陛下幸為久長計聖旨惻隱恩過天地臣在雍丘劬勞五年左右罷怠居業向定園果萬株枝條始茂私情區區實所重棄然桑田無業左右貧窮食裁餬口形有裸露臣聞古之仁君必有棄國以為百姓況乃轉居沃土人從蒙福江海所流無地不潤雲雨所加無物不茂若陛下念臣入從五年之勤少見佐助此枯木生華白骨更肉非臣之敢望也饑者易食寒者易衣臣之謂矣謝入覲表謝入覲表不世之命非所致思有若披浮雲而覩白日出幽谷而登喬木目希庭燎心存泰極謝入覲表謝入覲表臣得出幽屏之城獲覲百官之美此一喜也背茅茨之陋登閶闔之闥此二喜也必以有靦之容瞻見穆穆之顏此三喜也將以檮杌之質稟受崇聖之訓此四喜也謝周觀表詔使周觀初玩雲盤北觀疏圃遂步九華神明特處譎詭天然誠可謂帝室皇居者矣雖崑侖閬風之麗文昌之居不是過也謝明帝賜食表近得賜御食拜表謝恩尋奉手詔愍臣瘦弱奉詔之日涕泣橫流雖武文二帝所以愍憐於臣不復過於明詔答明帝詔表奉詔並見聖恩所作故平原公主誄文義相扶章章殊興句句感切哀動神明痛貫天地楚王臣彪等聞臣為讀莫不揮涕諫取諸國士息表臣聞古者聖君與日月齊其明四時等其信是以戮凶無重賞善無輕怒若驚霆喜若時雨恩不中絕教無二可以此臨朝則臣下知所死矣受任在萬里之外審主之所以授官必己之所以投命雖有搆會之徒泊然不以為懼者蓋君臣相信之明效也昔章子為齊將人有告之反者威王曰不然左右曰王何以明之王曰聞章子改葬死母彼尚不欺死父顧當叛生君乎此君之信臣也昔管仲親射桓公後幽囚從魯檻車載使少年挽而送齊管仲知桓公之必用己懼魯之悔謂少年曰吾為汝唱汝為和聲和聲宜走於是管仲唱之少年走而和之日行數百里宿昔而至至則相齊此臣之信君也臣初受封策書曰植受茲青社封於東土以屏翰皇家為魏藩輔而所得兵百五十人皆年在耳順或不踰矩虎賁官騎及親事凡二百餘人正復不老皆使年壯備有不虞檢校乘城顧不足以自救況皆復耄耋罷曳乎而名為魏東藩使屏翰王室臣竊自羞矣就之諸國國有士子合不過五百人伏以為三軍益損不復賴此方外不定必當須辦者臣願將部曲倍道奔赴夫妻負襁子弟懷糧蹈鋒履刃以徇國難何但習業小兒哉愚誠以揮涕增河鼷鼠飲海於朝萬無損益於臣家計甚有廢損又臣士息前後三送兼人已竭惟尚有小兒七八歲已上十六七已還三十餘人今部曲皆年耆臥在床席非糜不食眼不能視氣息裁屬者凡三十七人疲瘵風靡疣盲聾聵者二十三人惟正須此小兒大者可備宿衛雖不足以禦寇粗可以警小盜小者未堪大使為可使耘耡穢草驅護鳥雀休候人則一事廢一日獵則眾業散不親自經營則功不攝常自躬親不委下吏而已陛下聖仁恩詔三至士子給國長不復發明詔之下有若皦日保金石之恩必明神之信畫然自固如天如地定習業者並復見送晻若晝晦悵然失圖伏以為陛下既爵臣百寮之右居藩國之任為置卿士屋名為宮冢名為陵不使其危居獨立無異於凡庶若柏成欣耕於野子仲樂於灌園蓬戶茅牖原憲之宅也陋巷簞瓢顏子之居也臣才不見效用常慨然執斯志焉若陛下聽臣悉還部曲罷官屬省監官使解璽釋紱追柏成子仲之業營顏淵原憲之事居子臧之廬宅延陵之宅如此雖進無成功退有可守身死之日猶松喬也然伏度國朝終未肯聽臣之若是固當羈絆於世繩維繫於祿位懷屑屑之小憂執無已之百念安得蕩然肆志逍遙於宇宙之外哉此願未從陛下必欲崇親親篤骨肉潤白骨而榮枯木者惟遂仁德以副前恩望恩表臣聞寒者不貪尺玉而思短褐饑者不願千金而美一餐夫千金尺玉至貴而不若一餐短褐者物有所急也請祭先王表請祭先王表臣雖比拜表自計違遠以來有踰旬日垂竟夏節方到臣悲傷有心念先王公以夏至日終是以家俗不以夏日祭至於先王自可以今辰告祠臣雖卑鄙實稟體於先王自臣雖貧窶蒙陛下厚賜足供太牢之具臣欲祭先王於北河之上羊豬牛臣自能辦杏者臣縣自有先王喜食鰒魚臣前以表得徐州臧霸上鰒二百枚足以供事乞請水瓜五枚白柰二十枚計先王崩來未能半歲臣實欲告敬且欲復盡哀請赴元正表欣豫百官之美想見朝覲之禮耳存九成目想率舞作車帳表欲遣人到鄴市上黨布五十匹作車上小帳帷謁者不聽乞田表乞城內及城邊好田盡所賜百年力者臣雖生自至尊然心甘田野性樂稼穡獵表於七月伏鹿鳴塵四月五月射雉之際此正樂獵之時歐冶表昔歐冶改視鉛刀易價伯樂所盼駑馬百倍上銀鞍表於先武皇帝世勑此銀鞍一具初不敢乘謹奉上謝賜穀表詔書念臣經用不足以船河邸閣穀五千斛賜臣寫灌均上事令孤前令寫灌均所上孤章三臺九府所奏事及詔書一通置之坐隅孤欲朝夕諷詠以自警誡也七咨七咨素冰象玉難可磨蕩結土成龍遭雨則傷前錄自序前錄自序故君子之作也儼乎若高山勃乎若浮雲質素也如秋蓬摛藻也如春葩氾乎洋洋光乎皜皜與雅頌爭流可也余少而好賦其所尚也雅好慷慨所著繁多雖觸類而作然蕪穢者眾故刪定別撰為前錄七十八篇酈生頌序余道經酈生之墓聊駐馬書此文於其碑側遷都賦序余初封平原轉出臨淄中命鄄城遂徙雍丘改邑浚儀而末將適於東阿號則六易居實三遷連遇瘠土衣食不繼遷都賦覽乾元之兆域兮本人物乎上世紛水混沌而未分與禽獸乎無別椓蠡蜊而食蔬摭皮毛以自蔽畫贊序蓋畫者鳥書之流也昔明德馬后美於色厚於德帝用嘉之嘗從觀畫過虞舜廟見娥皇女英帝指之戲后曰恨不得如此人為妃又前見陶唐之像后指堯曰嗟乎群臣百寮恨不得戴君如是帝顧而笑故夫畫所見多矣上形太極混元之前卻列將來未萌之事觀畫者見三皇五帝莫不仰戴見三季暴主莫不悲惋見篡臣賊嗣莫不切齒見高節妙士莫不忘食見忠節死難莫不抗首見忠臣孝子莫不歎息見淫夫妬婦莫不側目見令妃順后莫不嘉貴是知存乎鑒者何如也與陳琳書夫披翠雲以為衣戴北斗以為冠帶虹蜺以為紳連日月以為佩此服非不美也然而帝王不服者望殊於天志絕於心矣葛天氏之樂千人唱萬人和因以蔑韶夏矣文心雕龍八引報孔璋書文心雕龍云陳思群才之英也報孔璋書云云此引事之實謬也按葛天之歌唱和三人而已相如上林云奏陶唐之舞聽葛天之歌千人唱萬人和唱和千萬人乃相如接人然而濫侈葛天推三成萬者信賦妄書致斯謬也驥騄不常一步應良御而效足與丁敬禮書頃不相聞覆相聲音亦為怪故乘興為書含欣而秉筆大笑而吐辭亦歡之極也答崔文始書臨江直釣不獲一鱗非江魚之不食其所餌之者非也是以君子慎舉擢成王漢昭論成王漢昭論周王以天下初定武王既終而成土尚幼未能定南面之事是以推以忠誠稱制假號二弟流言召公疑之發金縢之匱然後用寤亦未決也至於昭帝所以不疑於霍光亦緣武帝有遺詔於光使光若周公踐天子之位行周公之事吾恐叛者非徒二弟疑者非徒召公也且賢者固不能知聖賢自其宜爾昭帝固可不疑霍光周王自可疑周公也若以昭帝勝成王霍光當踰周公耶若以堯舜為成王湯禹作管蔡召公周公之不見疑必也仁孝論且禽獸悉知愛其母知其孝也唯白虎通麒麟稱仁獸者以其明盛衰知治亂也孝者施近仁者及遠輔臣論七首蓋精微聽察理析毫分規矩可則阿保不傾群言系於口而研摭是非典謨總乎心而唯所用之者鍾太傅也清素寡欲明敏特達志存太虛安心玄妙處平則以和養德遭變則以斷蹈義華太尉歆之謂也文武竝亮權智時發奢不過制儉不損禮入毗皇家帝之股肱出則侯伯實撫東夏者曹大司馬也辨博通幽見傳異度德實充塞於內知謀縱橫於外解疑釋滯剖散盤錯者王司徒朗也容中下士則眾心不攜進吐善謀則眾議不格疏達至德純粹者陳司空也智慮深奧淵然難測執節平敵中表條暢恭以奉上愛以接下納言左右為帝喉舌曹大將軍也魁傑雄特秉心平直威嚴足憚風行草靡在朝廷則匡贊時俗百僚儀一臨事則戎昭果毅折衝厭難者司馬驃騎也征蜀論今將以謀謨為劍戟以策略為旌旗師徒不擾藉力天師下礨成雷榛殘木碎干戈所拂則何虜不崩金鼓一駭則何城不登說疫氣二首建安二十二年癘氣流行家家有僵尸之痛室室有號泣之哀或闔門而殪或覆族而喪或以為疫者鬼神所作夫罹此者悉被褐茹藿之子荊室蓬戶之人耳若夫殿處鼎食之家重貂累蓐之門若是者鮮焉此乃陰陽失位寒暑錯時是故生疫而愚民懸符厭之亦可笑也鹹水之魚不游於江澹水之魚不入於海倉舒誄建安十二年五月甲戌童子曹倉舒卒乃作誄曰於惟淑弟懿矣純良誕豐令質荷天之光既哲且仁爰柔克剛彼德之容慈我聿行猗歟終然允臧宜逢分祚以永無疆如何昊天雕斯俊英嗚呼哀哉惟人之生忽若朝露促促百年亹亹行暮矧爾既夭十三而卒何辜于天景命不遂兼悲增傷侘傺失氣永思長懷哀爾罔極貽爾良妃襚爾嘉服越以乙酉宅彼城隅增丘峨峨寢廟渠渠姻媾雲會充路盈衢悠悠群司岌岌其車傾都蕩邑爰迄爾居魂而有靈庶可以娛嗚呼哀哉悲命賦哀魂靈之飛揚感時賦惟淫雨之永降曠三旬而未晞宴樂賦神龜歌舞異俗猨戲索上尋橦慰情賦黃初八年正月雨而北風飄寒園果墮冰枝幹摧折洛陽賦狐貉穴於紫闥兮茅莠生於禁闥本至尊之攸居於今之可悲射雉賦暮春之月宿麥盈野野雊群飛扇賦情駘蕩而外得心悅豫而內安增吳氏之姣好發西子之玉顏遙逝哀秋氣之可悲兮涼風肅其嚴厲神龍盤於重泉兮騰蛇蟄於幽穴雜詩離思一何深寡婦詩高墳鬱兮巍巍松柏森兮成行述仙遊將升雲煙失題遊鳥翔故巢狐死反丘穴我信歸舊鄉安得憚離別失題高談虛論問彼道原失題彈箏奮逸響新聲妙入神失題華屏列曜藻帳垂陰失題寒鶬蒸麑失題秋商氣轉微涼失題長鋏鳴鞘弓亟出行蒙霧犯風塵對酒行含生蒙澤草木茂延秋胡行歌以永言大魏承天璣對酒歌對酒歌蒲鞭葦杖示有刑忿志舜流共工西儀篇帝者化八極養萬物和陰陽陰陽和鳳至河洛翔樂府口厭常珍乃購麟鳳熊蹯豹胎百品異方蕙肴蘭藉五味雜香失題金樽玉杯不能使薄酒更厚失題烏鳥起舞鳳凰吹笙失題魴腴熊掌豹胎龜腸失題橙橘枇杷甘蔗代出王陵贊從漢有功少文任氣高后封呂直而不屈黻贊有皇子登是臨天位黻文字裳組華于黻王霸贊壯氣挺身奮節所征必拔謀顯垂惠孔甲贊行有順天龍出河漢雌雄各一是擾是豢罷朝表覲玉容而慶薦奉懽宴而慈潤失題情注於皇居心在乎紫極失題諸公熙朝之輔每作粥食之候餚惟蔬薤失題即日奉油囊之賜失題即日奉手詔驚喜踴躍也失題賜邁越紐縠失題身輕蟬翼恩重泰山失題爵重才輕求習業表雖免大誅得歸本國求出獵表臣自招罪釁徙居京師待罪南宮辨問赫灰而日曜之君子隱居以養真也衡門茅茨游說之士星流電耀子徒苞懷仁義銳精詩書全集遣句明鏡於三光探海出珠舉網羅鳳群士慕響俊乂來仕鱗集帝宇奇才美藝通微入神至治洞和國靜民康充實殷富泰階夷清仁聖相襲天罔不矜離宮觀畫野無旨酒進茲行潦上九尾狐表黃初元年十一月二十三日於鄄城縣北見眾狐數十首在後大狐在中央長七八尺赤紫色舉頭樹尾尾甚長大林列有枝甚多然後知九尾狐斯誠聖王德政和氣所應也毀鄄城故殿令令鄄城有故殿名漢武帝殿昔武帝好遊行或所幸處也梁桷傾頓棟宇零落修之不成良宅置之終於毀壞故頗撤取以備宮舍余時獲疾望風乘虛卒得恍惚數日後瘳而醫巫妄說以為武帝魂神生茲疾病此小人之無知愚惑之甚者也昔湯之隆也則夏館無餘迹武之興也則殷臺無遺基周之亡也則伊洛無隻椽秦之滅也則阿房無尺梠漢道衰則建章撤靈帝崩則兩宮燔高祖之魂不能未央孝明之神不能救德陽天子之存也必居名邦土則死有知亦當逍遙于華都留神於舊室則甘泉通天之臺雲陽九層之閣足以綏神育靈夫何戀於下縣而居靈於朽宅哉以生喻死則不然也況於死者之無知乎且聖帝明王顧宮闕之泰苑囿之侈有妨於時者或省以惠人況漢氏絕業大魏龍興隻人尺土非復漢有是以咸陽則魏之西都伊洛為魏之東京故夷朱雀而樹閶闔平德陽而建泰極況下縣腐殿為狐貍之窟藏者乎今將撤壤以修殿舍恐無知之人坐自生疑故為此令亦足以反惑而解迷焉禹廟贊序有禹祠植移於其城城本名杞城釋疑論初謂道術直呼愚民詐偽空言定矣及見武皇帝試閉左慈等令斷穀近一月而顏色不減氣力自若常云可五十年不食正爾復何疑哉令甘始以藥含生魚而煮之於沸脂中其無藥者熟而可食其銜藥者游戲終日如在水中也又以藥粉桑以飼蠶蠶乃到十月不老又以住年藥食雞雛及新生犬子皆止不復長以還白藥食犬百日毛盡黑乃知天下之事不可盡知而以臆斷之不可任也但恨不能絕聲色專心以學長生之道耳失題皇考建世業余從征四方櫛風而沐雨萬里蒙露霜劍戟不離手鎧甲為衣裳詰紂文崇侯何功乃用為輔西伯何辜囚之囹圄囹圄既成負土既盈興立炮烙賊害忠貞螢火論詩云熠燿宵行章句以為鬼火或謂之燐未為得也天陰沈數雨在於秋日螢火夜飛之時也故云宵行然腐草木得濕而光亦有明驗眾說並為熒火近得實矣例女傳頌尚卑貴禮來世作程代劉勳妻王氏見出為詩人言去婦薄去婦情更重千里不唾井況乃昔所奉遠望未為遙踟躕不得共夏啟讚大戰于甘有扈以滅威振諸侯元功克乂王霸贊王霸壯氣挺身奮節所征必拔謀顯垂惠
