body:
  text: 卷九誥咎文五行致災先史咸以為應政而作天地之氣自有變動未必政治之所興致也于時大風發屋拔木意有感焉聊假天帝之命以誥咎祈福辭曰上帝有命風伯雨師夫風以動氣雨以潤時陰陽協和庶物以滋亢陽害苗暴風傷條伊周是遇在湯斯遭桑林既禱慶雲克舉偃禾之復姬公去楚況我皇德承天統民禮敬川嶽祗肅百神享茲元吉釐福日新至若炎旱赫羲猋風扇發嘉卉以委良木以拔何谷宜填何山應伐何靈宜論何神宜謁於是五靈振悚皇祇赫怒招搖驚怯搶奮斧河伯典澤屏翳司風迴呵飛厲顧叱風隆息猋遏暴元敕華嵩慶雲是興效厥豐年遂乃沈陰坱圠甘澤微微雨我公田爰暨于私黍稷盈疇芳草依依靈禾重穗生彼邦畿年登歲豐民無餒飢釋愁文予以愁慘行吟路邊形容枯悴憂心如醉有玄靈先生見而問之曰子將何疾以至於斯答曰吾所病者愁也先生曰愁是何物而能病子乎答曰愁之為物惟恍惟惚不召自來推之弗往尋之不知其際握之不盈一掌寂寂長夜或群或黨去來無方亂我情爽其來也難退其去也易追臨餐困於哽咽煩冤毒於酸嘶加之以粉飾不澤飲之以兼肴不肥溫之以金石不消摩之以神膏不希授之以巧笑不悅樂之以絲竹增悲醫和絕思而無措先生豈能為我蓍龜乎先生作色而言曰予徒辯子之愁形未知子愁所由而生我獨為子言其發矣方今大道既隱子生末季沉溺流俗眩惑名位濯纓彈冠諮趣榮貴坐不安席食不終味遑遑汲汲或憔或悴所鬻者名所拘者利良由華薄凋損正氣吾將贈子以無為之藥給子以淡薄之湯刺子以玄虛之針炙子以淳朴之方安子以恢廓之宇坐子以寂寞之床使王喬與子而逝黃公與子詠歌而行莊子與子具養神之撰老聃與子致愛性之方趣避路以棲跡乘輕雲以翱翔於是精駭魂散改心回趣願納至言仰崇玄度眾愁忽然不辭而去七啟昔枚乘作七發傅毅作七激張衡作七辯崔駰作七依辭各美麗予有慕之焉遂作七啟並命王粲作焉玄微子隱居大荒之庭飛遯離俗澄神定靈輕祿傲貴與物無營耽虛好靜羡此永生獨馳思乎天雲之際無物象而能傾於是鏡機子聞而將往說焉駕超野之駟乘追風之輿經迥漠出幽墟入乎泱漭之野遂屆玄微子之所居其居也左激水右高岑背洞壑對芳林冠皮弁被文裘出山岫之潛穴倚峻崖而嬉游志飄飄焉嶢嶢焉似若狹六合而隘九州若將飛而未逝若舉翼而中留於是鏡機子攀葛藟而登距巖而立順風而稱曰予聞君子不遯俗而遺名智士不背世而滅勳今吾子棄道藝之華遺仁義之英耗精神乎虛廓廢人事之紀經譬若畫形於無象造響於無聲未之思乎何所規之不通也玄微子俯而應之曰嘻有是言乎夫太極之初混沌未分萬物紛錯與道俱隆蓋有形必朽有跡必窮茫茫元氣誰知其終名穢我身位累我躬竊慕古人之所志仰老莊之遺風假靈龜以托喻寧掉尾於塗中鏡機子曰夫辯言之艷能使窮澤生流枯木發榮庶感靈而激神況近在乎人情僕將為君子說游觀之至娛演聲色之妖靡論變化之至妙敷道德之弘麗願聞之乎玄微子曰吾子整身倦世探隱拯沉不遠遐路幸見光臨將敬滌耳以聽玉音鏡機子曰芳菰精粺霜蓄露葵玄熊素膚肥豢膿肌蟬翼之割剖纖析微累如疊縠離若散雪輕隨飛風刃不轉切山鵽斥鷃珠翠之珍搴芳蓮之巢龜膾西海之飛鱗臛江東之潛鼉臇漢南之鳴鶉糅以芳酸甘和既醇玄冥適鹹蓐收調辛紫蘭丹椒施和必節滋味既殊遺芳射越乃有春清縹酒康狄所營應化則變感氣而成彈徵則苦發扣宮則甘生於是盛以翠樽酌以雕觴浮蟻鼎沸酷烈馨香可以和神可以娛腸此餚饌之妙也子能從我而食之乎玄微子曰予甘藜藿未暇此食也鏡機子曰步光之劍華藻繁縟飾以文犀雕以翠綠綴以驪龍之珠錯以荊山之玉陸斷犀象未足稱雋隨波截鴻水不漸刃九旒之冕散曜垂文華組之纓從風紛紜佩則結綠懸黎寶之妙微符采照爛流景揚輝黼黻之服紗縠之裳金華之舄動趾遺光繁飾參差微鮮若霜緄佩綢繆或彫或錯薰以幽若流芳肆布雍容閒步周旋馳燿南威為之解顏西施為之巧笑此容飾之妙也子能從我而服之乎玄微子曰予好毛褐未暇此服也鏡機子曰馳騁足用蕩思游獵可以娛情僕將為吾子駕雲龍之飛駟飾玉輅之繁纓垂宛虹之長緌抗招搖之華旍捷忘歸之矢秉繁弱之弓忽躡景而輕騖逸奔驥而超遺風於是磎填谷塞榛藪平夷緣山置罝彌野張罘下無漏跡上無逸飛鳥集獸屯然後會圍獠徒雲布武騎霧散丹旗燿野戈殳皓旰曳文狐掩狡兔捎鷫鷞拂振鷺當軌見藉值足遇踐飛軒電逝獸隨輪轉翼不暇張足不及騰動觸飛鋒舉挂輕罾搜林索險探薄窮阻騰山赴壑風厲焱舉機不虛發中必飲羽於是人稠網密地逼勢脅哮闞之獸張牙奮鬣志在觸突猛氣不慴乃使北宮東郭之疇生抽豹尾分裂貙肩形不抗手骨不隱拳批熊碎掌拉虎摧班野無毛類林無羽群積獸如陵飛翮成雲於是駴鍾鳴鼓收旌弛旆頓綱縱網羆獠回邁駿騄齊驤揚鑾飛沫俯倚金較仰撫翠蓋雍容暇豫娛志方外此羽獵之妙也子能從我而觀之乎玄微子曰予性樂恬靜未暇此觀也鏡機子曰閒宮顯敞雲屋皓旰崇景山之高基迎清風而立觀彤軒紫柱文榱華梁綺井含葩金墀玉廂溫房則冬服絺綌清室則中夏含霜華閣緣雲飛陛陵虛俯眺流星仰觀八隅升龍攀而不逮眇天際而高居繁巧神怪變名異形班輸無所措其斧斤離婁為之失睛麗草交植殊品詭類綠葉朱榮熙天曜日素水盈沼叢木成林飛翮陵高鱗甲隱深於是逍遙暇豫忽若忘歸乃使任子垂釣魏氏發機芳餌沈水輕繳弋飛落翳雲之翔鳥援九淵之靈龜然後採菱花擢水蘋弄珠蜯戲鮫人諷漢廣之所詠覿游女於水濱燿神景於中沚被輕縠之纖羅遺芳烈而靜步抗皓手而清歌歌曰望雲際兮有好仇天路長兮往無由佩蘭蕙分為誰脩嬿婉絕兮我心愁此宮館之妙也子能從我而居之乎玄微子曰予耽巖穴未暇此居也鏡機子曰既游觀中原逍遙閒宮情放志蕩淫樂未終亦將有才人妙妓遺世越俗揚北里之流聲紹陽阿之妙曲爾乃御文軒臨洞庭琴瑟交揮左箎右笙鍾鼓俱振簫管齊鳴然後姣人乃被文縠之華袿振輕綺之飄颻戴金搖之熠燿揚翠羽之雙翹揮流芳燿飛文歷盤鼓煥繽紛長裾隨風悲歌入雲蹻捷若飛蹈虛遠蹠陵躍超驤蜿蟬輝霍翔爾鴻翥濈然鳧沒縱輕體以迅赴景追形而不逮飛聲激塵依威厲響才捷若神形難為象於是為歡未渫白日西頹散樂變飾微步中閨玄眉弛兮鉛花落收亂髮兮拂蘭澤形媠服兮揚幽若紅顏宜笑睇盻流光時與吾子攜手同行踐飛除即閒房花燭爛幄幕張動朱唇發清商揚羅袂振華裳九秋之夕為歡未央此聲色之妙也子能從我而遊之乎玄微子曰予願清虛未暇此遊也鏡機子曰予聞君子樂奮節以顯義烈士甘危軀以成仁是以雄俊之徒交黨結倫重氣輕命感分遺身故田光伏劍於北燕公叔畢命於西秦果毅輕斷虎步谷風威慴萬乘華夏稱雄詞未及終而玄微子曰善鏡機子曰此乃游俠之徒耳未足稱妙也若夫田文無忌之儔乃上古之俊公子也皆飛仁揚義騰躍道藝遊心無方抗志雲際陵轢諸侯驅馳當世揮袂則九野生風慷慨則氣成虹蜺吾子若當此之時能從我而友之乎玄微子曰予亮願焉然方於大道有累如何鏡機子曰世有聖宰翼帝霸世同量乾坤等曜日月玄化參神與靈合契惠澤播於黎苗威靈振乎無外超隆平於殷周踵羲皇而齊泰顯朝惟清王道遐均民望如草我澤如春河濱無洗耳之士喬嶽無巢居之民是以俊乂來仕觀國之光舉不遺材進各異方讚典禮於辟雍講文德於明堂正流俗之華說綜孔氏之舊章散樂移風國富民康神應休臻屢獲嘉祥故甘露紛而晨降景星宵而舒光觀遊龍於神淵聆鳴鳳於高岡此霸道之至隆而雍熙之盛際然主上猶尚以沈恩之未廣懼聲教之未厲采英奇於仄陋宣皇明於巖穴此甯子商歌之秋而呂望所以投綸而逝也吾子為太和之民不欲仕陶唐之世乎於是玄微子攘袂而興曰偉哉言乎近者吾子所述華淫欲以厲我祗攪予心至聞天下穆清明君莅國覽盈虛之正義知頑素之迷惑令予廓爾身輕若飛願反初服從子而歸九詠芙蓉車兮桂衡結萍蓋兮翠旌四蒼虬兮翼轂駕陵魚兮驂鯨菌薦兮席蕙幬兮苓床抗南箕兮簸瓊蕊挹天河兮滌玉觴靈既降兮泊靜默登文階兮坐紫房服春榮兮猗靡雲裾繞兮容裔冠北辰兮岌峨帶虹兮陵厲蘭肴御兮玉俎陳雅音奏兮文虞羅感漢廣兮羡游女揚激楚兮詠湘娥臨回風兮浮漢渚目牽牛兮眺織女交有際兮會有期嗟痛吾兮來不時來無見兮進無聞泣下雨兮嘆成雲先后悔其靡及冀后土之一悟猶搦轡而繁策馳覆車之危路群乘舟而無揖將何川而能度何世俗之蒙昧悼邦國之未靜椒蘭其望治由倒裳而求領尋湘漢之長流採芳岸之靈芝遇遊女於水裔採菱花而結詞野蕭條以極望曠千里而無人民生期於必死何自苦以終身寧作清水之沉泥不為濁路之飛塵蔓葛滋兮冒神宇何孤客之可悲皇祇降兮潛靈舞靈龍兮銜組流羽兮交橫停舟兮焉待舉帆兮安追溫風翕兮煎沙石鳥罔竄兮獸無蹠乘逸嚮兮執電鞭忽而往兮怳而旋越江兮刈蘭暮秋兮薄寒被簑兮戴笠置露兮踐雚徒勤躬兮苦心抗玉手吹簫瞍文詳素箏抗玉桴兮駭鼉鼓過穴兮清泠木鳴條兮動心踐丹穴兮觀鸞居通朱雀兮息南巢運蘭櫂以速往迴波之容與建五旗兮華采占揚雲麾兮龍鳳愬流風兮上邁貝船兮荷蓋柳頌序予以閑暇駕言出遊過友人楊德祖之家視其屋宇寥廓庭中有一柳樹聊戲刊其枝葉故著斯文表之遺翰遂因辭勢以譏當今之士與司馬仲達書司馬仲達書今賊徒欲保江表之城守歐吳耳無有爭雄於宇內角勝於平原之志也故其俗蓋以洲渚為營壁江淮為城壍而已若可得挑致則吾一旅之卒足以敵之矣蓋弋鳥者矯其矢釣魚者理其綸此皆度彼為慮因象設宜者也今足下曾無矯矢理綸之謀徒欲候其離舟伺其登陸乃圖並吳會之地牧東野之民恐非主上授節將之心也與楊德祖書植白數日不見思子為勞想同之也僕少小好為文章迄至于今二十有五年矣然今世作者可略而言也昔仲宣獨步於漢南孔璋鷹揚於河朔偉長擅名於青土公榦振藻於海隅德璉發跡於此魏足下高視於上京當此之時人人自謂握靈蛇之珠家家自謂抱荊山之玉吾王於是設天網以該之頓八紘以掩之今悉集茲國矣然此數子猶復不能飛軒絕跡一舉千里也以孔璋之才不閒於詞賦而多自謂能與司馬長卿同風譬畫虎不成反為狗也前有書嘲之反作論盛道僕讚其文夫鍾期不失聽于今稱之吾亦不能妄嘆者畏後世之嗤余也世人著述不能無病僕嘗好人譏彈其文有不善者應時改定昔丁敬禮嘗作小文使僕潤飾之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文之佳惡吾自得之後世誰相知定吾文者邪吾嘗歎此達言以為美談昔尼父之文辭與人通流至於制春秋遊夏之徒乃不能措一辭過此而言不病者吾未之見也蓋有南威之容乃可以論於淑媛有龍淵之利乃可以議於斷割劉季緒才不能逮於作者而好詆訶文章掎摭利病昔田巴毀五帝罪三王訾五霸於稷下一旦而服千人魯連一說使終身杜口劉生之辯未若田氏今之仲連求之不難可無息乎人各有好尚蘭茝蓀蕙之芳眾人所好而海畔有逐臭之夫咸池六莖之發眾人所共樂而墨翟有非之之論豈可同哉今往僕少小所著辭賦一通相與夫街談巷說必有可采擊轅之歌有應風雅匹夫之思未易輕棄也辭賦小道固未足以揄揚大義彰示來世也昔楊子云先朝執戟之臣耳猶稱壯夫不為也吾雖薄德位為蕃侯猶庶幾勠力上國流惠下民建永世之業流金石之功豈徒以翰墨為勳績辭賦為君子哉若吾志未果吾道不行則將采庶官之實錄辯時俗之得失定仁義之衷成一家之言雖未能藏之於名山將以傳之於同好非要之皓首豈今日之論乎其言之不慚恃惠子之知我也明早相迎書不盡懷曹植白與吳季重書與吳季重書植白季重足下前日雖因常調得為密坐雖燕飲彌日其於別遠會稀猶不盡其勞積也若夫觴酌陵波於前簫笳發音於後足下鷹揚其體鳳觀虎視謂蕭曹不足儔衛霍不足侔也左顧右盻謂若無人豈非君子壯志哉過屠門而大嚼雖不得肉貴且快意當斯之時願舉太山以為肉傾東海以為酒伐雲夢之竹以為笛斬泗濱之梓以為箏食若填巨壑飲若灌漏卮其樂固難量豈非大丈夫之樂哉然日不我與曜靈急節面有逸景之速別有參商之闊思欲抑六龍之首頓羲和之轡折若木之華閉濛汜之谷天路高邈良久無緣懷戀反側何如何如得所來訊文采委曲曄若春榮瀏若清風申詠反覆曠若復面其諸賢所著文章想還所治復申詠之也可令憙事小吏諷而誦之夫文章之難非獨今也古之君子猶亦病諸家有千里驥而不珍焉人懷盈尺和氏而無貴矣夫君子而不知音樂古之達論謂之通而蔽墨翟不好妓何為過朝歌而迴車乎足下好妓而正值墨翟迴車之縣想足下助我張目也又聞足下在彼自有佳政夫求而不得者有之矣未有不求而自得者也且改轍而行非良樂之御易民而治非楚鄭之政願足下勉之而已矣適對嘉賓口授不悉往來數相聞曹植白任城王誄昔二虢佐文旦奭翼武於休我王魏之元輔將崇懿跡等號齊魯如何奄忽命不是與仁者悼沒兼彼殊類矧我同生能不憯阻目想官墀心在平素彷彿魂神馳情陵墓凡夫愛命達著狥名王雖薨徂功著丹青人誰不沒德貴有遺乃作誄曰幼有令德光輝珪璋孝殊閔氏義達參商溫溫其恭爰柔克剛心存建業王室是匡矯矯元戎雷動雨徂橫行燕氏威慴北胡奔虜無竄還戰高柳王率壯士常為君首宜究長年永保皇家如何奄忽景命不遐同盟飲淚百寮咨嗟大司馬曹休誄於穆公侯魏之宗室明德繼踵奕世純粹闡弘汎愛仁以接物藝以為華體斯亮實年沒弱冠志在雄英高揖名師發言有章東夏翕然稱曰龍光貧而無怨孔以為難嗟我公侯屢空是安不耽世祿親悅為歡好彼蓬樞甘彼瓢簞味道忘憂踰憲超顏矯矯公侯不橈其厄呵叱三軍躬奮雉戟足蹴白刃手按飛鏑終弭淮南保我疆埸光祿大夫荀侯誄如冰之清如玉之潔法而不威和而不爇百寮欷歔霑纓機女投杼農夫輟耕輪結徹而不轉馬悲鳴而倚衡平原懿公主誄平原懿公主誄俯振地紀仰錯天文悲風激興霜猋雪雰凋蘭夭蕙良幹以泯於惟懿主瑛瑤其質協策應期含英秀出岐嶷之姿寔朗寔在生十旬察人識物儀同聖表聲協音律驤眉識往俛首知來求顏必笑和音則該阿保接手侍御充傍常在襁褓不停幃床專愛一宮取玩聖皇何圖奄忽罹天之殃魂神遷移精爽翱翔號之不應聽之不聆帝用吁嗟嗚呼失聲嗚呼哀哉憐爾早沒不逮陰光改封大郡惟帝舊疆建土開家邑移蕃王琨珮惟鮮朱紱斯煌國號既崇哀爾孤獨配爾名子華宗貴族爵以列侯銀艾優渥成禮于宮靈輀交轂生雖異室歿同山嶽爰構玄宮玉石交連朱房皓壁皜曜電鮮飾終備泣法生象存長埏繕脩神閨掩扉二柩並降雙魂孰依人誰不歿憐爾尚微阿保激感上聖傷悲城闕之詩以日喻歲況我愛子神光長滅扃關一闔曷其復晰武帝誄武帝誄於惟我王承運之衰神武震發群雄戡夷拯民于下登帝太微德美旦奭功越彭韋九德光備萬國作師寢疾不興聖體長違華夏飲淚黎庶含悲神翳功顯身沈名飛敢揚聖德表之素旗乃作誄曰於穆我王冑稷胤周賢聖是紹元懿允休先侯佐漢實維平陽功成績著德昭二王民以寧一興詠有章我王承統天姿特生年在志學謀過老成奮臂舊邦翻身上京表與我王交兵若神張陳背誓傲帝虐民擁徒百萬虎視朔濱我王赫怒戎車列陳武卒虓闞如雷如電攙槍北掃舉不浹辰紹遂奔北河朔是賓振旅京師帝嘉厥庸乃位丞相總攝三公進受上爵臨君魏邦九錫昭備大路火龍玄鑑靈察探幽洞微下無偽情姦不容非敦儉尚古不玩珠玉以身先下民以純撲聖性嚴毅手脩清一惟善是嘉靡疏靡昵怒過雷電喜踰春日萬國肅虔望風震肅既總庶政兼覽儒林躬著雅頌被之琴瑟茫茫四海我王康之微微漢嗣我王匡之群傑扇動我王服之喁喁黎庶我王育之光有天下萬國作君虔奉本朝德美周文以寬克眾每征必舉四夷賓服功夷聖武翼帝王世神武鷹揚左鉞右旄威凌伊呂年踰耳順體壯志肅乾乾庶事氣過方叔宜並南嶽君國無窮如何不弔禍鍾聖躬棄離臣子背世長終兆民號咷仰愬上穹既以約終令節不衰既即梓宮躬御綴衣璽不存身唯紼是荷明器無飾陶素是嘉既次西陵幽閨啟路群臣奉迎我王安厝窈窕玄宇三光不闥一扃尊靈永蟄聖上臨穴哀號靡及群臣陪臨佇立以泣去此昭昭於彼冥冥永棄兆民下君百靈千代萬乘曷時復形人事既關聰鏡神理文帝誄惟黃初七年五月七日大行皇帝崩嗚呼哀哉于時天震地駭崩山隕霜陽精薄景五緯錯行百姓吁嗟萬國悲悼若喪考妣思慕過唐擗踊郊野仰想穹蒼僉曰何辜早世隕喪嗚呼哀哉悲夫大行忽焉光滅永棄萬民雲往雨絕承問荒忽惛懵哽咽袖鋒抽刃欲自僵斃追慕三良甘心同穴感惟南風惟以鬱滯終於偕沒指景自逝考諸先記尋之哲言生若浮寄惟德可論朝聞夕逝孔志所存皇雖一歿天祿永延何以述德表之素旃何以詠功宣之管絃乃作誄曰皓皓太素兩儀始分中和產物肇有人倫爰暨三皇寔秉道真降逮五帝繼以懿純三代製作踵武立勳季嗣不維網漏于秦崩樂滅學儒坑禮焚二世而殲漢氏乃因弗求古訓嬴政是遵王綱帝典闃爾無聞末光幽昧道究運遷乾坤回歷簡聖授賢乃眷大行屬以黎元龍飛啟祚合契上玄五行定紀改號革年明明赫赫受命于天仁風偃物德以禮宣祥惟聖質嶷在幼妍研幾六典學不過庭潛心無妄抗志清冥才秀藻朗如玉之瑩聽察無響瞻覩未形其剛如金其貞如瓊如冰之潔如砥之平爵公無私戮違無輕心鏡萬機攬照下情思良股肱嘉昔伊呂搜揚側陋舉湯代禹拔才巖穴取士蓬戶唯聽是索弗拘禰祖宅土之表道義是圖弗營厥險六合是虞齊契共遵下以純民恢折規矩克紹前人科條品制褒貶以因乘殷之輅行夏之辰金根黃屋翠葆龍鱗紼冕崇麗衡紞維新尊肅禮容矚之若神方牧妙舉欽於恤民虎將荷節鎮彼四鄰朱旗所勦九壤被震疇克不若孰敢不臣縣旌海表萬里無塵虜備凶徹鳥殪江岷摧若涸魚乾鱗肅慎納貢越裳效珍條支絕域內賓德儕先王功侔太古上靈降瑞黃初叔祜河龍洛龜陵波遊下平均應繩神鸞翔舞數莢階除系風扇暑皓獸素禽飛走郊野神鍾寶鼎形自舊土雲英甘露瀸塗被宇靈芝冒沼朱華陰渚回回凱風祁祁甘雨稼穡豐登我稷我黍家佩惠君戶蒙慈父圖致太和洽德全義將登泰山先皇作儷鐫石紀勳兼錄眾瑞方隆封禪歸功天地賓禮百靈勳命視規望祭四嶽燎封奉柴肅于南郊宗祀上帝三牲既供夏禘秋嘗元侯佐祭獻璧奉璋鸞輿幽藹龍旂太常爰迄太廟鐘鼓鍠鍠頌德詠功八佾鏘鏘皇祖既饗烈考來享神具醉止降茲福祥天地震蕩大行康之三辰暗昧大行光之皇紘惟絕大行綱之神器莫統大行當之禮樂廢弛大行張之仁義陸沉大行揚之潛龍隱鳳大行翔之疏狄遐康大行匡之在位七載元功仍舉將永大和絕迹三五宜作物師長為神主壽終金石等算東父如何奄息摧身后土俾我煢煢靡瞻靡顧嗟嗟皇穹胡寧忍務嗚呼哀哉明監吉凶體遠存亡深垂典制申之嗣王聖上虔奉是順是將乃刱玄宇基為首陽擬迹穀林追堯慕唐合山同陵不樹不疆塗車芻靈珠玉靡藏百神警侍來賓幽堂耕禽田獸望魂之翔於是俟大隧之致力兮練元辰之淑禎潛華體於梓宮兮馮正殿以居靈顧望嗣之號咷兮存臨者之悲聲悼晏駕之既往兮感容車之速征浮飛魂於輕霄兮就黃墟以滅形背三光之昭晰兮歸玄宅之冥冥嗟一往之不返兮痛閟闥之長扃咨遠臣之眇眇兮感凶諱以怛驚心孤絕而靡告兮紛流涕而交頸思恩榮以橫奔兮閡闕塞之嶢崢顧衰絰以輕舉兮關防之我嬰欲高飛而遙憩兮憚天綱之遠經遙投骨於山足兮報恩養於下庭慨拊心而自悼兮懼施重而命輕嗟微軀之是效兮甘九死而忘生幾司命之役籍兮先黃髮而隕零天蓋高而察卑兮冀神明於我聽獨鬱伊而莫告兮追顧景而憐形奏斯文以寫思兮結翰墨以敷誠嗚呼哀哉卞太后誄率土噴薄三光改度陵頹谷踊五行牙錯皇室蕭條羽檄四布百姓欷歔嬰兒號慕若喪考妣天下縞素聖者知命殉道寶名義之攸在亦棄厥生敢揚后德表之旐旌光垂罔極以慰我情乃作誄曰我王之生坤靈是輔作合于魏亦光聖武篤生文帝紹虞之緒龍飛紫宸奄有九土詳惟聖善岐嶷秀出德配姜嫄不忝先哲玄覽萬機兼才備藝汎納容眾含垢藏疾仰奉諸姑降接儔列陰處陽潛外明內察及踐大位母養萬國溫溫其人不替明德悼彼邊氓未遑宴息恆勞庶事兢兢翼翼親桑蠶館為天下式樊姬霸楚書載其庸武王有亂孔嘆其功我后齊聖克暢丹聰不出房闥心照萬邦年踰耳順乾乾匪倦珠玉不玩躬御綈練日旰忘飢臨樂勿聽去奢即儉曠世作顯慎終如始蹈和履貞恭事神祗昭奉百靈跼天蹐地祗畏神明敬惟慎獨報禮幽冥虔肅宗廟蠲薦三牲降福無疆祝云其誠宜享斯祜蒙祉自天何圖凶咎不勉斯年嘗禱盡禮有篤無痊豈命有終神食其言遺孤在疚承諱東藩擗踊郊甸洒淚中原追號皇妣棄我何遷昔垂顧復今何不然空宮寥廓棟宇無煙物省階塗髣髴櫺軒仰瞻帷幄俯察几筵物不毀故而人不存痛莫酷斯彼蒼者天遂臻魏都游魂舊邑大隧開塗靈魄斯戢歎息霧興揮淚雨集徘徊輀柩號咷弗及神光既幽佇立以泣容車飾駕以合北辰金瓠哀辭金瓠予之首女雖未能言固已授色知心矣生十九旬而夭折乃作此辭辭曰在襁褓而撫育向孩笑而未言不終年而夭絕何見罰於皇天信吾罪之所招悲弱子之無諐去父母之懷抱滅微骸於糞土天長地久人生幾時先後無覺從爾有期行女哀辭行女生于季秋而終于首夏三年之中二子頻喪伊上帝之降命何短脩之難裁或華髮以終年或懷妊而逢災感前哀之未闋復新殃之重來方朝華而晚敷比辰露而先晞感逝者之不追悵情忽而失度天蓋高而無階懷此恨其誰訴家王征蜀漢仲雍哀辭仲雍哀辭曹喈字仲雍魏太子之仲子也三月而生五月而亡昔后稷之在寒冰鬭穀之在楚澤咸依鳥馮虎而無風塵之災今之玄笫文茵無寒冰之慘羅幃綺帳暖於翔鳥之翼幽房閑宇密於雲夢之野慈母良保仁乎鳥虎之情卒不能延期於朞載離六旬而夭殃彼孤蘭之眇眇亮成幹其畢榮哀綿綿之弱子早背世而潛形且四孟之未周將何願乎一齡陰雲回於素蓋悲風動其扶輪臨埏闥以欷歔淚流射而沾巾流塵飄蕩魂安歸痛玄廬之虛廓王仲宣誄並序王仲宣誄並序維建安二十二年正月二十四日戊申魏故侍中關內侯王君卒嗚呼哀哉皇穹神察哲人是恃如何靈祗殲我吉士誰謂不痛早世即冥誰謂不傷華繁中零存亡分流夭遂同期朝聞夕沒先民所思何用誄德表之素旗何以贈終哀以送之遂作誄曰猗歟侍中遠祖彌芳公高建業佐武伐商爵同齊魯邦嗣絕亡流裔畢萬勳續惟光晉獻賜封于魏之疆天開之祚末冑稱王厥姓斯氏條分葉散世茲芳烈揚聲秦漢會遭陽九炎光中矇世祖撥亂爰建時雍三台樹位履道是鍾寵爵之加匪惠惟恭自君二祖為光為龍僉曰休哉宜翼漢邦或統太尉或掌司空百揆惟敘五典克從天靜人和皇教遐通伊君顯考奕葉佐時入管機密朝政以治出臨朔岱庶績咸熙君以淑懿繼此洪基既有令德材技廣宣強記洽聞幽讚微言文若春華思若涌泉發言可詠下筆成篇何道不洽何藝不閒棊局逞巧博弈惟賢皇家不造京室隕顛宰臣專制帝用西遷君乃羈旅離此阻艱翕然鳳舉遠竄荊蠻身窮志達居鄙行鮮振冠南嶽濯纓清川潛處蓬室不干勢權我公奮鉞耀威南楚荊人或違陳戎講武君乃義發算我師旅高尚霸功投身帝宇斯言既發謀夫是與是與伊何響我明德投戈編鄀稽顙漢北我公寔嘉表揚京國金龜紫綬以彰勳則勳則伊何勞謙靡已憂世忘家殊略卓峙乃署祭酒與君行止算無遺策畫無失理我王建國百司俊乂君以顯舉秉機省闥戴蟬珥貂朱衣皓帶入侍帷幄出擁華蓋榮耀當世芳風晻藹嗟彼東夷憑江阻湖騷擾邊境勞我師徒光光戎輅霆駭風徂君侍華轂輝輝王塗思榮懷附望彼來威如何不濟運極命衰寢疾彌留吉往凶歸嗚呼哀哉翩翩孤嗣號慟崩摧發軫北魏遠迄南淮經歷山河泣涕如頹哀風興感行雲徘徊游魚失浪歸鳥忘棲嗚呼哀哉吾與夫子義貫丹青好和琴瑟分過友生庶幾遐年攜手同征如何奄忽棄我夙零感昔宴會志各高厲予戲夫子金石難弊人命靡常吉凶異制此驩之人孰先隕越何寤夫子果乃先逝又論死生存亡數度子猶懷疑求之明據儻獨有靈游魂泰素我將假翼飄颻高舉超登景雲要子天路喪柩既臻將及魏京靈輀回軌白驥悲鳴虛廓無見藏影蔽形孰云仲宣不聞其聲延首歎息雨泣交頸嗟乎夫子永安幽冥人誰不歿達士狥名生榮死哀亦孔之榮嗚呼哀哉
