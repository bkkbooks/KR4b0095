body:
  text: 卷三感婚賦陽氣動兮淑清百卉鬱兮含英春風起兮蕭條蟄蟲出兮悲鳴顧有懷兮妖嬈用搔首兮屏營登清臺以蕩志伏高軒而游情悲良媒之不顧懼歡媾之不成慨仰首而太息風飄飄以動纓出婦賦妾十五而束帶辭父母而適人以才薄之陋質奉君子之清塵承顏色以接意恐疏賤而不親悅新婚而忘妾哀愛惠之中零遂摧頹而失望退幽屏於下庭痛一旦而見棄心忉忉以悲驚衣入門之初服背床室而出征攀僕御而登車左右悲而失聲嗟冤結而無訴乃愁苦以長窮恨無愆而見棄悼君施之不終洛神賦並序黃初三年余朝京師還濟洛川古人有言斯水之神名曰宓妃感宋玉對楚王說神女之事遂作斯賦其詞曰余從京域言歸東藩背伊闕越轘轅經通谷陵景山日既西傾車殆馬煩爾乃稅駕乎蘅皋秣駟乎芝田容與乎陽林流盻乎洛川於是精移神駭忽焉思散俯則未察仰以殊觀覩一麗人於豈之畔迺援御者而告之曰爾有覿於彼者乎彼何人斯若此之艷也御者對曰臣聞河洛之神名曰宓妃然則君王之所見也無迺是乎其狀若何臣願聞之余告之曰其形也翩若驚鴻婉若遊龍榮曜秋菊華茂春松髣髴兮若輕雲之蔽月飄颻兮若流風之回雪遠而望之皎若太陽升朝霞迫而察之灼若芙蓉出淥波穠纖得衷脩短合度肩若削成腰如約素延頸秀項皓質呈露芳澤無加鉛華弗御雲髻峨峨脩眉聯娟丹脣外朗皓齒內鮮明眸善睞輔靨承權瓌姿艷逸儀靜體閑柔情綽態媚於語言奇服曠世骨像應圖披羅衣之璀粲兮珥瑤碧之華琚戴金翠之首飾綴明珠以耀軀踐遠遊之文履曳霧綃之輕裾微幽蘭之芳藹兮步踟躕於山隅於是忽焉縱體以遨以嬉左倚采旄右蔭桂旗攘皓腕於神滸兮采湍瀨之玄芝余情悅其淑美兮心振蕩而不怡無良媒以接歡兮托微波而通辭願誠素之先達兮解玉珮以要之嗟佳人之信脩兮羌習禮而明詩抗瓊珶以和予兮指潛淵而為期執眷眷之款實兮懼斯靈之我欺感交甫之棄言兮悵猶豫而狐疑收和顏而靜志兮申禮防以自持於是洛靈感焉徙倚彷徨神光離合乍陰乍陽竦輕軀以鶴立若將飛而未翔踐椒塗之郁烈步蘅薄而流芳超長吟以永慕兮聲哀厲而彌長爾迺眾靈雜遝命儔嘯侶或戲清流或翔神渚或採明珠或拾翠羽從南湘之二妃攜漢濱之遊女嘆匏瓜之無匹兮詠牽牛之獨處揚輕袿之猗靡兮翳脩袖以延佇體迅飛鳧飄忽若神凌波微步羅襪生塵動無常則若危若安進止難期若往若還轉盻流精光潤玉顏含辭未吐氣若幽蘭華容婀娜令我忘餐於是屏翳收風川后靜波馮夷鳴鼓女媧清歌騰文魚以驚乘鳴玉鑾以偕逝六龍儼其齊首載雲車之容裔鯨鯢踊而夾轂水禽翔而為衛於是越北沚過南岡紆素領回清陽動朱唇以徐言陳交接之大綱恨人神之道殊兮怨盛年之莫當抗羅袂以掩涕兮淚流襟之浪浪悼良會之永絕兮哀一逝而異鄉無微情以效愛兮獻江南之明璫雖潛處於太陰長寄心於君王忽不悟其所舍悵神霄而蔽光於是背下陵高足往神留遺情想像顧望懷愁冀靈體之復形御輕舟而上泝浮長川而忘反思綿綿而增慕夜耿耿而不寐霑繁霜而至曙命僕夫而就駕吾將歸乎東路攬騑轡以抗策悵盤桓而不能去愁霖賦迎朔風而爰邁兮雨微微而逮行悼朝陽之隱曜兮怨北辰之潛精車結轍以盤桓兮馬躑躅以悲鳴攀扶桑而仰觀兮假九日於天皇瞻沈雲之泱漭兮哀吾願之不將又曰夫何季秋之淫雨兮既彌日而成霖瞻玄雲之晻晻兮聽長空之淋淋中宵臥而歎息起飾帶而撫琴喜霽賦禹身誓於陽旰卒錫圭而告成湯感旱於殷時造桑林而敷誠動玉輞而雲披鳴鑾鈴而日陽指北極以為期吾將倍道而兼行登臺賦從明后之嬉遊聊登臺以娛情見天府之廣開觀聖德之所營建高殿之嵯峨浮雙闕乎太清立沖天之華觀連飛閣乎西城臨漳川之長流望眾果之滋榮仰春風之和穆聽百鳥之悲鳴天功怛其既立家願得而獲呈楊仁化於宇內盡肅恭於上京雖桓文之為盛豈足方乎聖明休矣美矣惠澤遠揚翼佐皇家寧彼四方同天地之矩量齊日月之輝光永貴尊而無極兮等年壽於東王九華扇賦並序昔吾先君常侍得幸漢桓帝賜尚方竹扇其扇不方不圓其中結成文名曰九華故為此賦其辭曰有神區之名竹生不周之高岑對綠水之素波背玄澗之重深體虛暢以立榦播翠葉以成林形五離而九華篾黧解而縷分效虬龍之蜿蟬法虹霓之氤氳攎微妙以歷時絢九層之華文爾乃浸以芷若拂以江蘺搖以五香濯以蘭池因形致好不常厥儀方不應矩圓不中規隨皓腕以徐轉發惠風之寒微時氣清以方厲紛飄動兮紈綺寶刀賦並序寶刀賦並序建安中魏王命有司造寶刀五枚三年乃就以龍虎熊馬雀為識太子得一余及余弟饒陽侯各得一焉其餘二枚家王自杖之賦曰有皇漢之明后思明達而玄通飛文藻以博致揚武備以禦凶乃熾火炎爐融鐵挺英烏獲奮椎歐冶是營扇景風以激氣飛光鑑於天庭爰告祠於太乙乃感夢而通靈然後礪以五方之石鑒以中黃之壤規圓景以定環攄神思而造象垂華紛之葳蕤流翠采之滉瀁故其陸斷犀革水斷龍角輕擊浮截刃不纖流踰南越之巨闕超西楚之泰阿實真人之攸御永天祿而是荷車渠椀賦惟斯椀之所生于涼風之浚濱采金光之定色擬朝陽而發輝豐玄素之暐暐帶朱榮之葳蕤縕絲綸以肆采藻繁布以相追翩飄颻而浮景若驚鵠之雙飛隱神璞於西野彌百葉而莫希于時乃有明篤神后廣被仁聲夷慕義而重使獻茲寶於斯庭命公輸使制匠窮妍麗之殊形華色粲爛文若點成鬱蓊雲蒸蜿蟬龍征光如激電影若浮星何神怪之巨偉信一覽而九雖離珠之聰目內炫耀而失精何明麗之可悅超群寶而特章俟君子之閒燕酌甘醴於斯觥既娛情而可貴故求御而不忘迷迭香賦播西都之麗草兮應青春而凝暉流翠葉於纖柯兮結微根於丹墀信繁華之速實兮弗見凋於嚴霜芳莫秋之幽蘭兮麗崑崙之英芝既經時而收采兮遂幽殺以增芳去枝葉而持御兮入綃穀之霧裳附玉體以行止兮順微風而舒光大暑賦炎帝掌節祝融司方羲和按轡南雀舞衡映扶桑之高熾燎九日之重光大暑赫其遂蒸玄服革而尚黃蛇折鱗於靈窟龍解角於皓蒼遂乃溫風赫戲草木垂榦山坼海沸沙融礫爛飛魚躍渚潛黿浮岸鳥張翼而近栖獸交遊而雲散于時黎庶徙倚棋布葉分機女絕綜農夫釋耘背暑者不群而齊跡向陰者不會而成群於是大人遷居宅幽緩神育靈雲屋重搆閒房肅清寒泉涌流玄木奮榮積素冰於幽館氣飛結而為霜奏白雪於琴瑟朔風感而增涼壯皇居之瑰瑋兮步八閎而為宇節四運之常氣兮踰太素之儀矩
