body:
  text: 卷一東征賦並序東征賦並序建安十九年王師東征吳寇余典禁兵衛官省然神武一舉東夷必克想見振旅之盛故作賦二篇登城隅之飛觀兮望六師之所營幡旗轉而心異兮舟楫動而傷情顧身微而任顯兮愧任重而命輕嗟我愁其何為兮心遙思而懸旌師旅憑皇穹之靈佑兮亮元勳之必舉揮朱旗以東指兮橫大江而莫御循戈櫓於清流兮泛雲梯而容與禽元帥於中舟兮振靈威於東野遊觀賦靜間居而無事將遊目以自娛登北觀而啓路涉雲際之飛除從羆熊之武士荷長戟而先驅罷若雲歸會如霧聚車不及回塵不獲舉奮袂成風揮汗如雨懷親賦並序濟陽南澤有先帝故營遂停馬住駕造斯賦焉獵平原而南騖覩先帝之舊營步壁壘之常制識旌旗之所停在官曹之典列心髣佛於平生回驥首而永遊赴修途以尋遠情眷戀而顧懷魂須臾而九反玄暢賦並序夫富者非財也貴者非寶也或有輕爵祿而重榮聲者或有反性命而徇功名者是以孔老異情楊墨殊義聊作斯賦名曰玄暢庶以司馬相如為上林賦控引天地古今陶神知機摛理表微夫何希世之大人罄天壤而作皇該仁聖之上義據神位以統方補五帝之漏月綴三代以維綱絙日際而來王僥余生之幸祿遘九二之嘉祥上同契於稷禼降合穎於伊望思薦寶以繼佩怨和璞之始鐫思黃鍾以協律怨伶夔之不存嗟所圖之莫合悵蘊結而延志希鵬舉以摶天蹶青雲而奮羽企駟躍而改駕任中才之展御望前軏而致策顧後乘而安驅匪逞邁之短修長前貞而保素弘道德以為宇築無怨以作藩溜慈惠以為圃耕柔順以為田不愧景而慚魄言縣天之何欲逸千載而流聲超遺黎而度俗衆才所歸絙日際而來王幽思賦幽思賦倚高臺之曲隅處幽僻之間深望翔雲之悠悠羌朝霽而夕陰顧秋華而零落感歲莫而傷心觀躍魚於南沼聆鳴鶴於北林搦素箏而慷慨揚大雅之哀吟仰清風以嘆息寄余思於悲絃信有心而在遠重登高以臨川何余心之煩錯寧翰墨之能傳節遊賦覽宮宇之顯麗實大人之攸居建三臺於前處飄飛陛以凌虛連雲閣以遠徑營觀榭於城隅亢高軒以回眺緣雲霓而結疏仰西嶽之嵩岑臨漳滏之清渠觀靡靡而無終何渺渺而難殊亮虛厚之所處非吾人之所廬於是仲春之月百卉叢生萋萋藹藹翠葉朱莖竹林青蔥珍果含榮凱風發而時鳥歡微波動而水蟲鳴感氣運之和順樂時澤之有成遂乃浮素蓋御驊騮命友生攜同儔誦風人之所歎遂駕言而出遊步北園而馳騖庶翱翔以解憂望洪池之滉漾遂降集乎輕舟浮沉蟻於金罍行觴爵於好仇絲竹發而響厲悲風激於中流且容與以盡觀聊永日而忘愁嗟羲和之奮迅怨曜靈之無光念人生之不永若春日之微霜諒遺名之可紀信天命之無常愈志蕩以淫遊非經國之大綱罷曲宴而旋服遂言歸乎舊房又感節賦攜友生而遊觀盡賓主之所求登高墉以永望冀消日以忘憂欣陽春之潛潤樂時澤之惠休望候雁之翔集想玄鳥之來遊嗟征夫之長勤雖處逸而懷愁懼天河之一回沒我身乎長流豈吾鄉之足顧戀祖宗之靈丘唯人生之忽過若鑿石之未耀慕牛山之哀泣懼平仲之我笑折若華之翳日庶朱光之常照願寄軀於飛蓬乘陽風之遠飄亮吾志之不從乃拊心以嘆息青雲鬱其西翔飛鳥翩而止匿欲縱體而從之哀余身之無翼大風隱其四起揚黃塵之冥冥鳥獸驚以來群草木紛其揚英見遊魚之涔灂感流波之悲聲內紆曲而潛結心怛惕以中驚匪榮德之纍身恐年命之早零慕歸全之明義庶不忝其所生商風入帷離思賦並序建安十六年大軍西討馬超太子留監國植時從焉意有憶戀遂作離思賦云在肇秋之嘉月將曜師而西旗余抱疾以賓從扶衡軫而不怡慮征期之方至傷無階以告辭念茲君之光惠庶沒命而不疑欲畢力於旌麾將何心而遠之願我君之自愛為皇朝而寶己水重深而魚悅林修茂而鳥喜又釋思賦並序家弟出養旋父郎中伊豫以兄弟之愛心有戀然作此賦以贈之彼翔友之離別猶求思乎白駒況同生之義絶重背親而為疏樂鴛鴦之同池羡比翼之共林亮根異其何戚痛別幹之傷心臨觀賦登高墉兮望四澤臨長流兮送遠客春風暢而氣通靈草含幹兮木交莖丘陵崛兮松柏青南國薆兮果載榮樂時物之逸豫悲豫志之長違歎東山之訴勤歌式微以訴歸進無路以效公退無隱以營私俯無鱗以遊遁仰無翼以翻飛
