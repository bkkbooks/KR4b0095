body:
  text: 卷五公宴公子敬愛客終宴不知疲清夜遊西園飛蓋相追隨明月澄清影列宿正參差秋蘭被長坂朱華冒緑池潛魚躍清波好鳥鳴高枝神飆接丹轂輕輦隨風移飄颻放志意千秋長若斯侍太子坐白日曜青春時雨靜飛塵寒冰辟炎景涼風飄我身清醴盈金觴肴饌縱橫陳齊人進奇樂歌者出西秦翩翩我公子機巧忽若神七哀七哀明月照高樓流光正徘徊上有愁思婦悲歎有餘哀借問歎者誰言是宕子妻君行踰十年孤妾常獨棲君若清路塵妾若濁水泥浮沈各異勢會合何時諧願為西南風長逝入君懷君懷良不開賤妾當何依膏沐誰為容明鏡暗不治南方有鄣氣晨鳥不得飛鬭雞遊目極妙伎清聽厭宮商主人寂無為衆賓進樂方長筵坐戲客鬭雞間觀房群雄正翕赫雙翹自飛揚揮羽邀清風悍目發朱光觜落輕毛散嚴距往往傷長鳴入青雲扇翼獨翱翔願蒙狸膏助常得擅此場元會元會初歲元祚吉日惟良乃為佳會宴此高堂尊卑列敘典而有章衣裳鮮潔黼黻玄黃清酤盈爵中坐騰光珍膳雜遝充溢圓方笙磬既設箏瑟俱張悲歌厲響咀嚼清商俯視文軒仰瞻華梁願保茲喜千載為常歡笑盡娛樂哉未央皇家榮貴壽考無疆送應氏二首步登北邙阪遙望洛陽山洛陽何寂寞宮室盡燒焚垣墻皆頓劈荊棘上參天不見舊耆老但覩新少年側足無行徑荒疇不復田遊子久不歸不識陌與阡中野何蕭條千里無人煙念我平生親氣結不能言清時難屢得嘉會不可常天地無終極人命若朝霜願得展嬿婉我友之朔方親昵並集送置酒此河陽中饋豈獨薄賓飲不盡觴愛至望苦深豈不愧中腸山川阻且遠別促會日長願為比翼鳥施翮起高翔雜詩六首高臺多悲風朝日照北林之子在萬里江湖迥且深方舟安可極離思故難任孤雁飛南遊過庭長哀吟翹思慕遠人願欲托遺音形影忽不見翩翩傷我心其二轉蓬離本根飄颻隨長風何意回飆舉吹我入雲中高高上無極天路安可窮類此遊客子捐軀遠從戎毛褐不掩形薇藿常不充去去莫復道沈憂令人老其三西北有織婦綺縞何繽紛明晨秉機杼日昃不成文太息終長夜悲嘯守青雲妾身入空閨良人行從軍自期三年歸今已歷九春飛鳥繞樹翔噭噭鳴索群願為南流景馳光見我君其四南國有佳人容華若桃李朝遊北海岸夕宿瀟湘沚時俗薄朱顏誰為發皓齒俯仰歲將暮榮耀難久恃其五僕夫早嚴駕吾行將遠遊遠遊欲何之吳國為我仇將聘萬里塗東路安足由江介多悲風淮泗馳急流願欲一輕濟惜哉無方舟間居非吾志甘心赴國憂其六飛觀百餘尺臨牖御櫺軒遠望周千里朝夕見平原烈士多悲心小人偷自間國讎亮不塞甘心思喪元拊劍西南望思欲赴太山絃急悲聲發聆我慷慨言喜雨天覆何彌廣苞育此群生棄之必憔悴惠之則滋榮慶雲從北來鬱述西南征時雨終夜降長雷周我廷嘉種盈膏壤登秋必有成太和二年大旱三麥不收百姓分於飢餓離友並序鄉人有夏侯威者少有成人之風余尚其為人與之昵好王師振旅送豫于魏邦心有眷然為之隕涕乃作離友之詩其辭曰王旅旋兮背故鄉彼君子兮篤人剛媵豫行兮歸朔方馳原隰兮尋舊疆車載奔兮馬繁驤涉浮濟兮泛輕航迄魏都兮息蘭房展宴好兮惟樂康其二涼風肅兮白霧滋木感氣兮柔葉辭臨淥水兮登重基折秋華兮采靈芝尋永歸兮贈所思感離隔兮會無期伊鬱悒兮情不怡日匿景兮天微陰經迥路兮造北林應詔肅承明詔應會皇都星陳夙駕秣馬脂車命彼掌徒肅我征旅朝發鸞臺夕宿蘭渚芒芒原隰祁祁士女經彼公田樂我稷黍爰有樛木重陰匪息雖有餱糧飢不遑食望城不過面邑不遊僕夫警策平路是由玄駟藹藹揚鑣漂沫流風翼衡輕雲承蓋涉澗之濱緣山之隈遵彼河滸黃阪是階西濟關谷或降或升騑驂倦路載寢載興將朝聖皇匪敢晏寧弭節長騖指日遄征前驅舉燧後乘抗旌輪不輟運鸞無廢聲爰暨帝室稅此西墉嘉詔未賜朝覲莫從仰瞻城閾俯惟闕庭長懷永暮憂心如酲贈徐幹驚風飄白日忽然歸西山圓景光未滿衆星粲以繁志士營世業小人亦不間聊且夜行遊遊彼雙闕間文昌鬱雲興迎風高中天春鳩鳴飛棟流猋激櫺軒顧念蓬室士貧賤誠足憐薇藿弗充虛皮褐猶不全慷慨有悲心興文自成篇寶棄怨何人和氏有其愆彈冠俟知己知己誰不然良田無晚歲膏澤多豐年亮懷璵璠美積久德愈宣親交義在敦申章復何言贈丁儀贈丁儀初秋涼氣發庭樹微銷落凝霜依玉除清風飄飛閣朝雲不歸山霖雨成川澤黍稷委疇隴農夫安所獲在貴多忘賤為恩誰能博狐白足禦冬焉念無衣客思慕延陵子寶劍非所惜子其寧爾心親交義不薄贈王粲端坐苦愁思攬衣起西遊樹木發春華清池激長流中有孤鴛鴦哀鳴求匹儔我願執此鳥惜哉無輕舟欲歸忘古道顧望但懷愁悲風鳴我側羲和逝不留重陰潤萬物何懼澤不周誰令君多念遂使懷百憂又贈丁儀王粲又贈丁儀王粲從軍度函谷驅馬過西京山岑高無極涇渭揚濁清壯哉帝王居佳麗殊百城員闕出浮雲承露概泰清皇佐揚天惠四海無交兵權家雖愛勝全國為令名君子在末位不能歌德聲丁生怨在朝王子歡自營歡怨非貞則中和誠可經贈白馬王彪黃初四年五月白馬王任城王與余俱朝京師會節氣到洛陽任城王薨至七月與白馬王還國後有司以二王歸藩道路宜異宿止意毒恨之蓋以大別在數日是用自剖與王辭焉憤而成篇謁帝承明廬逝將歸舊疆清晨發皇邑日夕過首陽伊洛廣且深欲濟川無梁泛舟越洪濤怨彼東路長顧瞻戀城闕引領情內傷太谷何寥廓山樹鬱蒼蒼霖雨泥我塗流潦浩縱橫中逵絶無軌改轍登高岡修坂造雲日我馬玄以黃玄黃猶能進我思鬱以紆鬱紆將難進親愛在離居本圖相與偕中更不克俱鴟梟鳴衡枙豺狼當路衢蒼蠅間白黑讒巧令親疏欲還絶無蹊攬轡止踟蹰踟蹰亦何留相思無終極秋風發微涼寒蟬鳴我側原野何蕭條白日忽西匿歸鳥赴喬林翩翩厲羽翼孤獸走索群銜草不遑食感物傷我懷撫心長太息太息將何為天命與我違奈何念同生一往形不歸孤魂翔故域靈柩寄京師存者忽復過亡沒身自衰人生處一世去若朝露晞年在桑榆間影響不能追自顧非金石咄唶令心悲心悲動我神棄置莫復陳丈夫志四海萬里猶比鄰愛恩苟不虧在遠分日親何必同衾幬然後展殷勤憂思成疾疢無乃兒女仁倉卒骨肉情能不懷苦辛苦辛何慮思天命信可疑虛無求列仙松子久吾欺變故在斯須百年誰能持離別永無會執手將何時王其愛玉體俱享黃髮期收淚即長路援筆從此辭贈丁翼贈丁翼嘉賓填城闕豐膳出中廚吾與二三子曲宴此城隅秦箏發西氣齊瑟揚東謳肴來不虛歸觴至反無餘我豈狎異人朋友與我俱大國多良材譬海出明珠君子義休偫小人德無儲積善有餘慶榮枯立可須滔蕩固大節世俗多所拘君子通大道無願為世儒朔風仰彼朔風用懷魏都願騁代馬倏忽北徂凱風永志思彼蠻方願隨越鳥翻飛南翔四氣代謝懸景運周別如俯仰脫若三秋昔我初遷朱華未希今我旋止素雪云飛俯降千仞仰登天阻風飄蓬飛載離寒暑千仞易陟天阻可越昔我同袍今永乖別子好芳草豈忘爾貽繁華將茂秋霜悴之君不垂眷豈云其誠秋蘭可喻桂樹冬榮絃歌蕩思誰與銷憂臨川慕思何為泛舟豈無和樂遊非我鄰誰忘泛舟愧無榜人矯志芳樹雖香難以餌烹尸位素餐難以成名磁石引鐵於金不連大朝舉士愚不聞焉抱璧塗乞無為貴寶履仁遘福無為貴道鴛雛遠害不羞卑棲靈虬避難不恥污泥都蔗雖甘杖之必折巧言雖美用之必滅濟濟唐朝萬邦作孚逢蒙雖巧必得良弓聖主雖知必得英雄螳螂見嘆齊士輕戰越王軾蛙國以死獻道遠知驥世偽知賢覆之壽之順天之矩澤如凱風惠如時雨口為禁闥舌為發機門機之關楛矢不追仁虎匿爪神龍隱鱗閨倩二首攬衣出中閨逍遙步兩楹間房何寂寞緑草被階庭空穴自生風百鳥翔南征春思安可忘憂戚與君并佳人在遠道妾身單且煢歡會難再逢芝蘭不重榮人皆棄舊愛君豈若平生寄松為女蘿依水如浮萍齎身奉襟帶朝夕不墮傾儻終顧盻恩永副我中情有一美人被服纖羅妖姿艷麗蓊若春華紅顏韡曄雲髻嵯峨彈琴撫節為我絃歌清濁齊均既亮且和取樂今日遑恤其他三良功名不可為忠義我所安秦穆先下世三臣皆自殘生時等榮樂既沒同憂患誰言捐軀易殺身誠獨難攬涕登君墓臨穴仰天歎長夜何冥冥一往不復還黃鳥為悲鳴哀哉傷肺肝責躬於穆顯考時惟武皇受命于天寧濟四方朱旗所拂九土披攘玄化滂流荒服來王超商越周與唐比蹤篤生我皇亦世載聰武則肅烈文則時雍受禪于漢君臨萬邦萬邦既化率由舊章廣命懿親以藩王國帝曰爾侯君茲青土奄有海濱方周于魯車服有輝旗章有敘濟濟雋乂我弼我輔伊爾小子恃寵驕盈舉挂時網動亂國經作藩作屏先軌是墮傲我皇使犯我朝儀國有典刑我削我黜將置于理元凶是率明明天子時惟篤類不忍我刑暴之朝肆違彼執憲哀豫小子改封兗邑于河之濱股肱弗置有君無臣荒淫之闕誰弼余身煢煢僕夫于彼冀方嗟豫小子乃罹斯殃赫赫天子恩不遺物冠我玄冕要我朱紱光光大使我榮我華剖符授玉王爵是加仰齒金璽俯執聖策皇恩過隆祗承怵惕咨我小子頑凶是嬰逝慚陵墓存愧闕庭匪敢傲德實恩是恃威靈改加足以歿齒昊天罔極生命不圖常懼顛沛抱罪黃壚願蒙矢石建旗東嶽庶立毫釐微功自贖危軀授命知足免戾甘赴江湘奮戈吳越天啓其衷得會京畿遲奉聖顏如渴如飢心之云慕愴矣其悲天高聽卑皇肯照微情詩情詩微陰翳陽景清風飄我衣遊魚潛緑水翔鳥薄天飛眇眇客行士徭役不得歸始出嚴霜結今來白露晞遊者嘆黍離處者歌式微慷慨對嘉賓悽愴內傷悲妬嗟爾同衾曾不是志寧彼冶容安此妬忌芙蓉池逍遙芙蓉池翩翩戲輕舟南陽雙栖鵠北柳有鳴鳩雜詩悠悠遠行客去家千餘里出亦無所之入亦無所止浮雲翳日光悲風動地起美玉生磐石寶劍出龍淵帝王臨朝服秉此威百蠻歷不見貴雜糅刀間言志慶雲未時興雲龍潛作魚神鸞失其儔還從燕雀居
