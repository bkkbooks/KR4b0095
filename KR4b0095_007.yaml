body:
  text: 卷七皇子生頌皇子生頌於聖我后憲章前志克篡二皇三靈昭事祗肅郊廟明德敬惠潛和積石鍾天之釐嘉月令辰篤生聖嗣天地降祥儲君應祉慶由一人萬國作喜喁喁萬國岌岌群生稟命我后綏之則榮長為臣職終天之經仁聖奕代永載明明同年上帝休祥淑禎藩臣作頌光流德聲吁嗟卿士祗承豫聽玄俗頌玄俗妙識飢餌神穎在陰倏游即陽無景逍遙北嶽凌霄引領揮霧昊天含神自靜母儀頌母儀頌殷湯令妃有莘之女仁教內修度義以處清謐后宮九嬪有序伊為媵臣遂作元輔明賢頌明賢頌於鑠姜后光配周宣非禮不動非禮不言晏起失朝永巷告愆王用勤政萬國以虔孔子廟頌修復舊廟豐其甍宇莘莘學徒爰居爰處王教既備郡小遄沮魯道以興永作憲矩洪聲登避神祇來祜休徵雜沓瑞我邦家內光區域外被荒遐學官頌學官頌自五帝典絶三皇禮廢應期命世齊賢等聖者莫高於孔子也故有若曰出乎類拔乎萃誠所謂性與天道不可得而聞矣由也務學名在前志宰豫晝寢糞土作誡過庭子弟詩禮明記歌以詠言文以騁志豫今不述后賢曷識於鑠尼父生民之傑性與天成該聖備藝德倫三五配皇作烈玄鏡獨鑑神明昭晰仁塞宇宙志凌雲霓學者三千莫不俊乂惟仁是憑惟道足恃鑽仰彌高請益不已言為世範行為時矩社頌余前封鄄城侯轉雍丘皆遇荒土宅宇初造以府庫尚豐志在繕宮室務園圃而已農桑一無所營經離十載塊然守空飢寒備嘗聖朝愍之故封此縣田則一州之膏腴桑則天下之甲第故封此桑以為田社乃作頌云於惟太社官名后土是曰勾龍功著上古德配帝王實為靈主克明播植農正曰柱尊以作稷豐年是與義與社同方神北宇建國承家莫不攸敘宜男花頌草號宜男既曄且貞其貞伊何惟乾之嘉其曄伊何緑葉丹花光采晃曜配彼朝日君子耽樂好和琴瑟固作螽斯惟立孔臧福濟大姒永世克昌冬至獻襪頌玉趾既御履和蹈貞行與祿邁動以祥并南窺北戶西巡王城翱翔萬域聖體浮輕晷景舒長庖犧贊木德風姓八卦創焉龍瑞名官法地象天庖廚祭祀罟網魚畋瑟以象時神德通玄女媧贊古之國君造簧作笙禮物未就軒轅篡成或云二皇人首蛇形神化七十何德之靈神農贊少典之胤火德承木造為耒耜導民播穀正為雅琴以暢風俗黃帝贊少典之孫神明聖哲土德承火赤帝是滅服牛乘馬衣裳是制雲氏名官功冠五帝少昊贊祖自軒轅青陽之裔金德承土儀鳳帝世官鳥號名殊職別系農正扈氏各有品制顓頊贊顓頊贊昌意之子祖自軒轅始誅九黎水德統天以國為號風化神宣威暢八極靡不祗虔帝嚳贊祖自軒轅玄囂之裔生言其名木德帝世撫寧天地神聖靈察教弭四海明並日月帝堯贊帝堯贊火德統位父則高辛克平共工萬國同塵調適陰陽其惠如春巍巍成功配天則神帝舜贊顓頊之族重瞳神聖克協頑瞽應唐蒞政除凶舉俊以齊七政應曆受禪顯天之命夏禹贊吁嗟天子拯世濟民克卑宮室致孝鬼神蔬食薄服黻冕乃新厥德不回其誠可親亹亹其德溫溫其人尼稱無間何德之純舜居隴畝明德上宣孝乎頑瞽乂不格奸舜將崩殂告天禪位虞氏既沒三年禮畢避隱商山示不敢蒞諸侯向己乃奉天秩殷湯贊殷湯代夏諸侯振仰放桀鳴條南面以王桑林之禱炎災克償伊尹佐治可謂賢相湯禱桑林贊惟殷之世炎旱七年湯禱桑林祈福于天翦髮離爪自以為牲皇靈感應時雨以靈周文王贊周文王贊於赫聖德實惟文王三分有二猶服事商化加虞芮傍暨四方王業克昭武嗣遂光周武王贊桓桓武王繼世滅殷咸任尚父且作商臣功皆四海救世濟民天下宗周萬國是賓周公贊成王即位年尚幼稚周公居攝四海慕利罰叛柔服祥應仍至誦長反政達夫忠義周成王贊成王繼武賢聖保傅年雖幼稚岐嶷有素初疑周公終焉克寤旦奭佐治遂致刑錯漢高帝贊屯雲斬蛇靈母告祥朱旗既抗九野披攘禽嬰克羽掃滅英雄承機帝世功著武湯漢文帝贊孝文即位愛物儉身驕吳撫越胸奴和親納諫赦罪以德讓民殆至刑錯萬國化淳漢武帝贊世宗光光文武是攘威振百蠻恢拓土疆簡定律曆辨修舊章封天禪土功越百王漢景帝贊景帝明德繼文之則肅清王室克滅七國省役薄賦百姓殷昌風移俗易齊美成康姜嫄簡狄贊嚳有四妃子皆為王帝摯早崩堯承天綱玄鳥大跡殷周美祥稷契既生翊化虞唐禹妻贊禹妻塗山土功是急惟啓之生過門不入矯達明義勳庸是執成長望嗣大祿以襲班婕妤贊班婕妤贊有德有言實惟班婕盈沖其驕窮悅其厭在漢夷貞在晉正接臨飆端幹衝霜振葉吹雲贊天地變化是生神物吹雲吐潤浮雲蓊鬱赤雀賦贊赤雀賦贊西伯積德天命攸顧赤雀銜書爰集昌戶瑞為天使和氣所致嗟爾後王昌期而至巢父贊巢父贊堯禪許由巢父是恥穢其溷聽臨河洗耳池主是讓以水為濁嗟此三士清足厲俗務光贊務光贊湯將伐桀謀於卞子既讓位隨以為恥薄於殷世著自汙己自投潁水清風邈矣商山四皓贊嗟爾四皓避秦隱形劉項之爭養志弗營不應朝聘保節全貞應命太子漢嗣以寧三鼎贊三鼎贊鼎質之精古之神器黃帝是鑄以像太上能輕能重知凶識吉世衰則隱世和則出承露盤銘並序夫形能見者莫如高物不朽者莫如金氣之清者莫如露盛之安者莫如盤明帝乃詔有司鑄銅建承露盤在芳林園中莖長十二丈大十圍上盤徑四尺九寸下盤徑五尺銅龍繞其根龍身長一丈背負兩子自立於芳林園甘露乃降使臣為頌銘銘曰岧岧承露峻極太清神君礧磈洪基嶽停下潛醴泉上受雲英和氣四充翔風所經匪我明君孰能經營近歷闡度三光朗明殊俗歸義祥瑞混并鸞鳳晨棲甘露宵零神物攸協高而不傾奉戴巍恭統神器固若露盤長存永貴賢聖繼跡奕世明德不忝先功保茲皇極垂祚億兆永荷天秩弊之天壤以顯元功寶刀銘造茲寶刀既礱既礪匪以尚武豫身是衛麟角是觸鸞距匪蹶
