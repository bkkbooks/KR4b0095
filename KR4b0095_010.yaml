body:
  text: 卷十漢二祖優劣論漢二祖優劣論有客問豫曰夫漢二帝高祖光武俱為受命撥亂之君此時事之難易論其人之優劣孰者為先豫應之曰昔漢之初興高祖因暴秦而起官由亭長自亡徒招集英雄遂誅強楚光有天下功齊湯武業流後嗣誠帝王之元勳人君之盛事也然而名不繼德行不純道直寡善人之美稱鮮君子之風采惑秦宮而不出窘項坐而不起計失乎酈生忿過乎韓信太公是誥于孝違矣敗古今之大教傷王道之實義身歿之後崩亡之際果令凶婦肆鴆酷之心嬖妾被人豕之刑亡趙幽囚禍殃骨肉諸呂專權社稷幾移凡此諸事豈非高祖寡計淺慮以致然彼之雄材大略俶儻之節信當世至豪健壯傑士也又其梟將畫臣皆古今之鮮有歷世之希覩彼能任其才而用之聽其言而察之故兼天下而有帝位流巨功而遺元勳也不然斯不免於閭閻之人當世之匹夫也世祖體乾靈之休德稟貞和之純精通黃鐘之妙理韜亞聖之懿才其為德也通達而多識仁智而明恕重慎而周密樂施而愛人值陽九無妄之世遭炎光厄會之運殷爾雷發赫然神舉用武略以攘暴興義兵以掃殘神光前驅威風先逝軍未出於南京莽已弊於西都破二公於昆陽斬阜賜於漢津當此時也九州鼎沸四海淵涌言帝者二三稱王者四五咸鴟視狼顧虎超龍驤光武秉朱光之臣鉞震赫斯之隆怒夫其蕩滌凶穢勦除醜類若順迅風而縱烈火曬白日而掃朝雲也若克東齊難勝之寇降赤眉不計之虜彭寵以望異內隕龐萌以叛主取誅隗戎以背信軀斃公孫以離心授首爾乃廟謀而後動衆計定而後行師故攻無不陷之壘戰無奔北之卒是以群下欣欣歸心聖德宣仁以和衆邁德以來遠於時戰克之將等畫之臣承詔奉令者獲寵違命犯旨者顛危故曰建武之行師也計出於主心勝決於廟堂故竇融聞聲而影附馬援一見而嘆息股肱有濟濟之美元首有穆穆之容敦睦九族有唐虞之稱高尚純朴有羲皇之素謙虛納下有吐握之勞留心庶事有日昃之勤乃規弘迹而造皇極創帝道而立德基是以計功則業殊比隆則事異旌得則靡愆言行則無穢量力則勢微論輔則力劣卒能握乾坤之休徵應五百之顯期立不刊之遐迹建不朽之元功金石播其休烈詩書載其勳懿故曰光武其優也漢之二祖俱起布衣高祖闕於微細光武知於禮法高祖又鮮君子之風溺儒冠不可言敬辟陽淫僻與衆共之詩書禮樂帝堯之所以為治也而高帝輕之濟濟多士文王之所以獲寧也高帝蔑之不用聽戚姬之邪媚致呂氏之暴戾將則難比於韓周謀臣則不敵於良平魏德論元氣否塞玄黃噴薄晨星亂逆陰陽舛錯國無完邑陵無掩槨四海鼎沸蕭條沙漠武王之興也以道陵殘義氣風發神戈退指則妖氛順制靈旗一舉則朝陽播越惟我聖后神武蓋天威光佐掃辰彗北彎首尾爭擊氣齊率然乃電北席卷千里隱乎若崩嶽旰乎若潰海慍彼蠻夏蠢爾弗恭脂我蕭斧簡武練鋒星陳而天運振耀乎南封荊人風靡交益影從軍蘊餘勢襲利乘權蕩鬼區於白水摛矯制於遐川仰屬目於條支晞弱水之潺湲薄張騫於大夏笑驃騎於祁連其化之也如神其養之也如春柔遠能邇誰敢不賓憲度增飾日曜月明迹存乎建安道隆乎延康於是漢氏歸義顧音孔昭顯禪天位希唐效堯上猶謙謙弗納也發不世之明詔薄皇居而弗泰蹈北人之清節美石戶之高介義貫金石神明已興神祇致祥乾靈效祜於是群公卿士功臣列辟率爾而進曰昔文王三分居二以服事殷非能之而弗欲蓋欲之而弗能況天網弗禁皇綱圮紐侯民非復漢萌尺土非復漢有故皇父創迹於前陛下光美於後蓋所謂勳成於彼位定於此者也將使斯民播秬鬯植靈芝鋤岐穗挹醴滋遂乃凱風回猋甘露匝時農夫詠於田隴織婦而綜絲黃吻之齓含哺而怡鮐背之老擊壤而嬉古雖稱乎赫胥曷若斯之大治乎于時上富於春秋聖德汪濊奇志妙思神鑒靈察方將審御陰陽增耀日月極禎祥於遐奧飛仁風以樹惠既遊精於萬機逍遙乎六藝兼覽儒林抗思乎文藻之場囿容與乎道術之疆畔超天路而高峙階清雲以妙觀將參迹於三皇豈徒論功於大漢天地位矣九域清矣皇化四達帝猷成矣明哉元首股肱貞矣禮樂既作興頌聲矣固將封泰山禪梁甫歷名山以祈福周五方之靈宇越八九於往素踵帝王之靈矩流餘祚於黎蒸鍾元吉乎聖主纖雲不形陽光赫戲武創洪基克光厥德玄宴之化豐洽之政武帝執政日白雀集於庭槐棲筆寢牘含光而不明矇竊惑焉名儒按讖良史披圖有白鵲之瑞不能貫道義之清英窮混元於太素亦以明矣在昔太初玄黃混并渾沌鴻濛兆朕未形相論世固有人身瘠而志立體小而名高者於聖則否是以堯眉八彩舜目重瞳禹耳參漏文王四乳然則世亦有四乳者此則駑馬一毛似驥耳又曰宋臣有公孫呂者長七尺面長三尺廣三尺名震天下若此之狀蓋遠代而求非一世之異也使形殊於外道合其中名震天下不亦宜乎語云無憂而戚憂必及之無慶而歡樂必隨之此心有先動而神有先知則色有先見也故扁鵲見桓公知其將亡申叔見巫臣知其竊妻而逃也荀子曰以為天不知人事耶則周公有風雷之災宋景有三舍之福以為知人事耶則楚昭有弗禜之應魏文無延期之報由是言之則天道之與相占可知而疑不可得而無也白起為人頭小而鋭瞳子白黑分明故可與持久難與爭鋒辨道論夫神仙之書道家之言乃云傅説上為辰尾宿歲星降下為東方朔淮南王安誅於淮南而謂之獲道輕舉鉤弋死於雲陽而謂之尸逝柩空其為虛妄甚矣哉中興篤論之士有桓君山者其所著述多善劉子駿嘗問言人誠能抑嗜欲闔耳目可不衰竭乎時庭中有一老榆君山指而謂曰此樹無情欲可忍無耳目可闔然猶枯稿腐朽而子駿乃言可不衰竭非談也君山援榆喻之未是也何者余前為王莽典樂大夫樂記云文帝得魏文侯樂人竇公年百八十兩目盲帝奇而問之何所施行對曰臣年十三而失明父母哀其不及事教臣鼓琴臣不能導引不知壽得何力君山論之曰頗得少盲專一內視情不外鋻之助也先難子駿以內視無益退論竇公便以不外鑒證之吾未見其定論也君山又曰方山有董仲君者有罪繫獄佯死數日目陷蟲出死而復生然後竟死生之必死君子所達夫何喻乎夫至神不過天地不能使蟄蟲夏潛震雷冬發時變則物動氣移而事應彼仲君者乃能藏其氣尸其體爛其膚出其蟲無乃大怪乎世有方士吾王悉所招致甘陵有甘始盧江有左慈陽城有郗儉始能行氣導引慈曉房中之術儉善辟穀悉號數百歲所以集之魏國者誠恐此人之徒接姦詭以欺衆行妖惡以惑民故聚而禁之也豈復欲觀神仙於瀛洲求安期於邊海釋金輅而顧雲輿棄六驥而求飛龍哉自家王與太子及余兄弟咸以為調笑不信之矣然始等知上遇之有恆奉不過於員吏賞不加於無功海島難得而遊六黻難得而佩終不敢進虛誕之言出非常之語余嘗試郗儉絶穀百日躬與之寢處行步起居自若也夫人不食七日則死而儉乃如是然不必益壽可以療疾而不憚飢饉焉左慈善修房內之術差可終命然自非有志至精莫能行也甘始者老而有少容自諸術士咸共歸之然始辭繁寡實頗有怪言余嘗辟左右獨與之談問其所行溫顏以誘之美辭以導之始語余吾本師姓韓字世雄嘗與師於南海作金前後數四投數萬斤金於海又言諸梁時西域胡來獻香罽腰帶割玉刀時悔不取也又言車師之西國兒生擘背出脾欲其食少而努行也又言取鯉魚五寸一雙合其一煮藥俱投沸膏中有藥者奮尾鼓鰓遊行沈浮有若處淵其一者已熟而可噉余時問言率可試否言是藥去此逾萬里當出塞始不自行不能得也言不盡於此頗難悉載故粗舉其巨怪者始若遭秦始皇漢武帝則復為徐市欒大之徒也桀紂殊世而齊惡姦人異代而等偽乃如此耶又世虛然有仙人之説仙人者儻猱猿之屬與世人得道化為仙人乎夫雉入海為蜃燕入海為蛤當夫徘徊其翼差池其羽猶自識也忽然自投神化體變乃更與黿鱉為群豈復自識翔林薄巢垣屋之娛乎牛哀病而為虎逢其兄而噬之若此者何貴於變化邪夫帝者位殊萬國富有天下威尊彰明齊光日月宮殿闕庭焜耀紫薇何顧乎王母之宮崑崙之域哉夫三烏被致不如百官之美也素女嫦娥不若椒房之麗也雲衣羽裳不若黼黻之飾也駕螭載霓不若乘輿之盛也瓊蕊玉華不若玉圭之潔也而顧為匹夫所罔納虛妄之辭信眩惑之説隆禮以招弗臣傾産以供虛求散王爵以榮之清間館以居之經年纍稔終無一驗或歿於沙丘或崩於五柞臨時雖復誅其身滅其族紛然足為天下一笑矣若夫玄黃所以娛目鏗鏘所以聳耳媛妃所以紹先芻豢所以悅口也何以甘無味之味聽無聲之樂觀無彩之色也然壽命長短骨體強劣各有人焉善養者終之勞擾者半之虛用者夭之其斯之謂歟藉田説藉田説春耕于藉田郎中令侍寡人焉顧而謂之曰昔者神農氏始嘗萬草教民種植今寡人之興此田將欲以擬乎治國非徒供耳目而已也夫營疇萬畝厥田上下經以大陌帶以橫阡奇柳夾路名果被園宰農實掌是謂公田此亦寡人之封疆也日殄沒而歸館晨未昕而即野此亦寡人之先下也菽雚特疇禾黍異田此亦寡人之理政也及其息泉涌庇重陰懷有虞撫素琴此亦寡人之所習樂也蘭蕙荃蘅植之近疇此亦寡人之所親賢也刺藜臭蔚棄之遠疆此亦寡人之所遠佞也若年豐歲登果茂菜滋則臣僕小大咸取驗焉又曰封人有能以輕鑿修鉤去樹之蝎者樹得以茂繁中舍人曰不識治天下者亦有蝎者乎寡人告之曰昔三苗共工鯀歡兜非堯之蝎歟問曰諸侯之國亦有蝎乎寡人告之曰齊之諸田晉之六卿魯之三桓非諸侯之蝎歟然三國無輕鑿修鉤之任終於齊篡魯弱晉國以分不亦痛乎曰不識為君子者亦有蝎乎寡人告之曰固有之也富而慢貴而驕殘仁賊義甘財悅色此亦君子之蝎也天子勤耘以牧一國大夫勤耘以收世祿君子勤耘以顯令德夫農者始於種終於穫澤既時矣苗既美矣棄而不耘則改為荒疇蓋豐年者期於必收譬修道亦期於歿身也寡人御輦登於金商之館察田夫之私者使習壤者相澤仁才者播種田修種理者必賜之以巨觴田蕪種穢者必戮之以柔桑名王親枉千乘於隴畝之中執鋤钁於畦町之側尊距勤於耒耜玉手勞於耕耘者也夫凡人之為圃各植其所好焉好甘者植乎薺好苦者植乎荼好香者植乎蘭好辛者植乎蓼至於寡人之圃無不植也令禽惡鳥論令禽惡鳥論國人有以伯勞生獻者王召見之侍臣曰世人同惡伯勞之鳴敢問何謂也王曰月令仲夏鵙始鳴詩云七月鳴鵙七月夏五月鵙則博勞也昔尹吉甫用後妻之説殺孝子伯奇其弟伯封求而不得作黍離之詩俗傳云吉甫後悟追傷伯奇出遊于田見異鳥鳴於桑其聲噭然吉甫動心曰無乃伯奇乎鳥乃撫翼其音尤切吉甫曰果吾子也乃顧謂曰伯奇勞乎是吾子棲吾輿非吾子飛勿居言未卒鳥尋聲而栖于蓋歸入門集於井幹之上向室而號吉甫命後妻載弩射之遂射殺後妻以謝之故俗惡伯勞之鳴言所鳴之家必有尸也此好事者附名為之説令俗人惡之而今普傳惡之斯實否也伯勞以五月而鳴應陰氣之動陽為人養陰為賊害伯勞蓋賊害之鳥也屈原曰鶗鴂之先鳴使百草為之不芳其聲鵙鵙然故俗憎之若其為人災害愚民之所信通人之所略也鳥鳴之惡自取憎人言之惡自取滅不有能纍於當世也而凶人之行弗可易梟鳥之鳴不可更者天性然也昔荊之梟將徙巢於吳鳩遇之曰子將安之梟曰將巢於吳鳩曰何去荊而巢吳乎梟曰荊人惡豫之聲鳩曰子能革子之聲則免無為去荊而巢吳也如不能革子之音則吳楚之民不異情也為子計者莫若宛頸戢翼終身勿復鳴也昔會朝議者有人問曰寧有聞梟食其母乎有答之者曰嘗聞烏反哺未聞梟食母也問者慚唱不善也孟春之旦從太陽方貴放鳥雀者加其祿也得善者莫不馴而放之為利人也得蚤者莫不糜之齒牙為害身也鳥獸昆蟲猶以名聲見異況夫吉士之與凶人乎穀於穆聖皇仁暢惠渥辭獻減膳以服鰥獨和氣致祥時雨灑沃野草萌芽變化嘉穀禾猗猗嘉禾惟穀之精其洪盈箱協穗殊莖昔生周朝今植魏庭獻之朝堂以昭祖靈鵲鵲之強強詩人取喻今存聖世呈質見素飢食苕華渴飲清露異於儔匹衆鳥是慕鳩班班者鳩爰素其質昔翔殷邦今為魏出朱目丹趾靈姿詭類載飛載鳴彰我皇懿甘露玄德洞幽飛化上蒸甘露以降蜜淳冰凝觀陽弗晞瓊爵是承獻之帝朝以明聖徵連理木皇樹嘉德風靡雲披有木連理別幹同枝將承大同應天之規髑髏説曹子遊乎陂塘之濱步乎蓁穢之藪蕭條潛虛經幽踐阻顧見髑髏塊然獨居於是伏軾而問之曰子將結纓首劍殉國君乎將被堅執鋭斃三軍乎將嬰茲固疾命隕傾乎將壽終數極歸幽冥乎叩遺骸而嘆息哀白骨之無靈慕嚴周之適楚儻託夢以通情於是伻若有來恍若有存影見容隱厲聲而言曰子何國之君子乎既枉輿駕愍其枯朽不惜咳唾之音而慰以若言子則辨於辭矣然未達幽冥之情識死生之説也夫死之為言歸也歸也者歸於道也道也者身以無形為主故能與化推移陰陽不能更四時不能虧是故洞於纖微之域通於恍惚之庭望之不見其象聽之不聞其聲挹之不充注之不盈吹之不凋噓之不榮激之不流凝之不停寥落冥漠與道相拘偃然長寢樂莫是踰曹子曰豫將請之上帝求諸神靈使司命輟籍反子骸形於是髑髏長呻廓然歎曰甚矣何子之難語也昔太素氏不仁無故勞我以形苦我以生今也幸變而之死是反吾真也何子之好勞而我之好逸乎子則行矣豫將歸於太虛於是言卒響絶神光霧除顧將旋軫乃命僕夫拂以玄塵覆以縞巾爰將藏彼路濱覆以丹土翳以緑榛夫存亡之異世乃宣尼之所陳何神憑之虛對云死生之必均
