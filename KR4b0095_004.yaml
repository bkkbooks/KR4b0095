body:
  text: 卷四神龜賦並序神龜賦並序龜壽千歲時有遺余龜者數日而死肌肉消盡唯甲存焉余感而賦之曰嘉四靈之建德各潛位乎一方蒼龍虬於東嶽白虎嘯於西岡玄武集於寒門朱雀棲於南鄉順仁風以消息應聖時而后翔嗟神龜之奇物體乾坤之自然下夷方以則地上規隆而法天順陰陽以呼吸藏景曜於重泉餐飛塵以實氣飲不竭於朝露步容趾以俯仰時鸞回而鶴顧忽萬載而不恤周無疆於太素感白靈之翔翥卒不免乎豫且雖見珍於宗廟罹刳剝之重辜欲訴怨於上帝將等愧乎遊魚懼沉泥之逢殆赴芳蓮以巢居安玄雲而好靜不淫翔而改度昔嚴周之抗節援斯靈而托喻嗟祿運之屯蹇終遇獲於江濱歸籠檻以幽處遭淳美之仁人晝顧瞻以終日夕撫順而接晨遘淫災以殞越命勦絶而不振天道昧而未分神明幽而難燭黃氏沒於空澤松喬化於扶木蛇折鱗於平皋龍脫骨於深谷亮物類之遷化疑斯靈之解殼白鶴賦嗟皓麗之素鳥兮含奇氣之淑祥薄幽林以屏處兮蔭重景之餘光狹單巢於弱條兮懼衝風之難當無沙棠之逸志兮欣六翮之不傷承邂逅之僥幸兮得接翼於鸞凰同毛衣之氣類兮信休息之同行痛美會之中絶兮遘嚴災而逢殃拜太息而祗懼兮抑吞聲而不揚傷本規之違忤悵離群而獨處恆竄伏以窮栖獨哀鳴而戢羽冀大綱之難結得奮翅而遠遊聆雅琴之清韻記六翮之末流蟬賦唯夫蟬之清素兮潛厥類乎太陰在盛陽之仲夏兮始遊豫乎芳林實淡泊而寡欲兮獨咍樂而長吟聲皎皎而彌厲兮似貞士之介心內含和而弗食兮與衆物而無求棲高枝而仰首兮賴朝露之清流隱柔桑之稠葉兮快間居而遁暑苦黃雀之作害兮患螂螳之徑斧冀飄翔而遠托兮毒蜘蛛之網罟欲降身而卑竄兮懼草蟲之襲豫免衆難而弗獲兮遙遷集乎宮宇依名果之茂陰兮托修幹以靜處有翩翩之狡童兮步容與於園圃體離朱之聰視兮姿才捷於猴猿條罔葉而不挽兮樹無幹而不緣翳輕驅而奮進兮跪側足以自間恐余身之驚駭兮精曾睨而目連持柔竿之冉冉兮運微黏而我纏欲翻飛而愈滯兮知性命之長捐委厥體於膳夫歸炎炭而就燔秋霜紛以宵下晨風裂其過庭氣憯怛而薄軀足攀木而失莖吟嘶啞以沮敗狀枯稿以喪形辭曰詩歎鳴蜩聲嘒嘒兮盛陽則來大陰逝兮皎皎貞素侔夷節兮帝臣是戴尚其潔兮鸚鵡賦美中州之令鳥越衆類之殊名感陽和而振翼遁太陰以存形遇旅人之嚴網殊六翮之無遺身挂滯於重籠孤雌鳴而獨歸豈豫身之足惜憐衆雛之未飛分靡軀以潤鑊何全濟之敢希蒙含育之厚德奉君子之光輝怨身輕而施重恐往惠之中虧常戢心以懷懼雖處安其若危永哀鳴其報德庶終來而不疲鶡賦並序鶡之為禽猛氣其鬭終無勝負期於必死遂賦之焉美遐圻之偉烏生大行之嵓阻體貞剛之烈性亮乾德之所輔戴毛角之雙立揚玄黃之徑羽甘沈隕而重辱有節士之儀矩降居擅澤高處保岑遊不同嶺棲必異林若有翻雄駭遊孤雌驚翔則長鳴挑敵鼓翼專場踰高越壑雙戰隻僵階侍斯珥俯耀文墀成武官之首飾增庭燎之高暉離繳雁賦並序余遊於武陵中有雁離繳不能復飛顧命舟人追而得之故憐而賦焉憐孤雁之偏特兮情惆焉而內傷尋淑類之殊異兮稟上天之休祥含中和之純氣兮赴四節而征行遠玄冬於南裔兮避炎夏於朔方白露淒以飛揚兮秋風發乎西商感節運之復至兮假魏道而翱翔接羽翮以南北兮情逸豫而永康望范氏之發機兮播纖繳以凌雲挂微軀之輕翼兮忽頽落而離群旅暗驚而鳴遠兮徒矯首而莫聞甘充君之下廚膏函牛之鼎鑊蒙生全之顧覆何恩施之隆博於是縱軀歸命無慮無求飢食稻粱渴飲清流鷂雀賦鷂欲取雀雀自言雀微賤身卑些少肌肉瘠瘦所得蓋少君欲相噉實不足飽鷂得雀言初不敢語頃來轗軻資糧乏旅三日不食略思死鼠今日相得寧復置汝雀得鷂言意甚征營性命至重雀鼠貪生君得一食我命是傾皇天降鑑賢者是聽鷂得雀言意甚怛惋當死斃雀頭如果蒜不早首服烈頸大喚行人聞之莫不往觀雀得鷂言意甚不移依一棗樹藂蕽多刺目如擘椒跳蕭二翅我當死矣略無可避鷂乃置雀良久方去二雀相逢似是公嫗相將入草共上一樹仍敘本末辛苦相語向者共出為鷂所捕賴我翻捷體素便附説我辨語千條萬句欺恐舍長令兒大怖我之得免復勝於兔自今徙意莫復相妬言雀者但食牛矢中豆馬矢中粟蝙蝠賦吁何姦氣生茲蝙蝠形殊性詭每變常式行不由足飛不假翼明伏暗動盡似鼠形謂鳥不似二足為毛飛而含齒巢不哺鷇空不乳子不容毛群斥逐羽族下不蹈陸上不馮木芙蓉賦覽百卉之英茂無斯華之獨靈結修根於重壤泛清流而擢莖退潤王宇進文帝庭竦芳柯以從風奮纖枝之璀璨其始榮也皎若夜光尋扶桑其揚暉也晃若九陽出暘谷芙蓉蹇産菡萏星屬絲條垂珠丹榮吐緑焜焜韡韡爛若龍燭觀者終朝情猶未足於是狡童媛女相與同遊擢素手於羅袖接紅葩於中流酒賦並序余覽揚雄酒賦辭甚瑰瑋頗戲而不雅聊作酒賦粗究其終始賦曰嘉儀氏之造思亮茲美之獨珍嗟麯糵之殊味仰酒旗之景曜協嘉號於天辰穆公酣而興霸漢祖醉而蛇分穆生以醴而辭楚侯嬴感爵而增深諒千鍾之可慕何百觚之足云其味有亮沂久載休名宜城醪醴蒼梧縹清或秋藏冬發或春醞夏成或雲拂潮涌或素蟻浮萍爾乃王孫公子遊俠翱翔將承芬以接意會陵雲於朱堂獻酬交錯宴笑無方於是飲者並醉縱橫喧譁或揚袂屢舞或扣劍清歌或嚬噈辭觴或奮爵橫飛或歎驪駒既駕或稱朝露未晞於斯時也質者或文剛者或仁卑者忘賤寠者忘貧和睚眥之宿憾雖怨讎其必親於是矯俗先生聞之而歎曰噫夫言何容易此乃淫荒之源非作者之事若耽于觴酌流情縱逸先王所禁君子所斥敘嘉賓之歡會惟耽樂之既闋日暗暗於桑榆兮命僕夫而皆逝安沈湎而為娛非往聖之所述闢酒誥之明戒同元凶於三季槐賦槐賦羡良木之華麗爰獲貴於至尊憑文昌之華殿森列峙乎端門觀朱欀之振條據文陛而結根楊沈陰以博覆似明后之垂恩在季春以初茂踐朱夏而乃繁覆陽精之炎景散流耀以增鮮植橘賦植橘賦有朱橘之珍樹于鶉火之遐鄉稟太陽之烈氣嘉杲日之休光體天然之素分不遷徙于殊方播萬里而遙植列銅爵之園廷背江川之暖氣處玄朔之肅清邦換壤別爰用喪生處彼不凋在此先零朱實不凋焉得素榮惜寒暑之不均嗟華實之永乖仰凱風以傾葉冀炎氣之所懷揚鳴條以流響晞越鳥之來栖夫靈德之所感物無微而不和神蓋幽而易激信天道之不訛既萌根而弗幹諒結葉而不華漸玄化而弗變非彰德於邦家附微條以歎息哀草木之難化
