body:
  text: 卷二潛志賦潛大道以遊志希往昔之遐烈矯貞亮以作矢當苑囿之呈藝驅仁義以為禽必信忠而後發退隱身以滅跡進出世而取容且摧剛而和謀接處肅以靜恭亮知榮而守辱匪狥天以為通閒居賦何吾人之介特去朋匹而無儔出靡時以娛志入無樂以消憂何歲月之若騖復民生之無常感陽春之發節聊輕駕之遠翔登高丘以延企時薄暮而起余仰歸雲以載奔遇蘭蕙之長圃冀芬芳之可服結春衡以延佇入虛廊之閒館步生風之高廡踐密邇之脩除即蔽景之玄宇翡翠翔於南枝玄鶴鳴於北野青魚躍於東沼白鳥戲於西渚遂乃背通谷對綠波藉文茵翳春華丹轂更馳羽騎相過愬寒風以開襟願同衾於寒女慰子賦彼凡人之相親小離別而懷戀況中殤之愛子乃千秋而不見入空室而獨倚對孤幃而切嘆痛人亡而物在心何忍而復觀日晼晚而既沒月代照而舒光仰列星以至晨衣霑露而含霜惟逝者之日遠愴傷心而絕腸敘愁賦並序時家二女弟故漢皇帝聘以為貴人家母見二弟愁思故令予作賦曰嗟妾身之微薄信未達乎義方遭母氏之聖善奉恩化之彌長迄盛年而始立脩女職於衣裳承師保之明訓誦六列之篇章觀圖像之遺形竊庶幾乎英皇委微軀於帝室充末列於椒房荷印紱之令服非陋才之所望對床帳而太息慕二親以憎傷揚羅袖而掩涕起出戶而彷徨顧堂宇之舊處悲一別之異鄉秋思賦秋思賦四節更王兮秋氣悲遙思惝怳兮若有遺原野蕭條兮煙無依雲高氣靜兮露凝野草變色兮莖葉稀鳴蜩抱木兮雁南飛西風悽悷兮朝夕臻扇箑屏棄兮絺綌捐歸室解裳兮步庭前月光照懷兮星依天居一世兮芳景遷松喬難慕兮誰能仙長短命也兮獨何愆又九愁賦嗟離思之難忘心慘毒而含哀踐南畿之末境越引領之徘徊眷浮雲以太息顧攀登而無階匪徇榮而愉樂信舊都之可懷恨時王之謬聽受奸枉之虛辭揚天威以臨下忽放臣而不疑登高陵而反顧心懷愁而荒悴念先寵之既隆哀後施之不遂雖危亡之不豫亮無遠君之心刈桂蘭而秣馬舍余車於西林願接翼於歸鴻嗟高飛而莫攀因流景而寄言響一絕而不還傷時俗之趨險獨悵望而長愁感龍鸞而匿跡如吾身之不留竄江介之曠野獨眇眇而沉舟思孤客之可悲愍予身之翩翔豈天監之孔明將時運之無常謂內思而自策算乃昔之愆殃以忠言而見黜信毋負於時王俗參差而不齊豈毀譽之可同競昏瞀以營私害予身之奉公共朋黨而妬賢俾予濟乎長江嗟大化之移易悲性命之攸遭愁慊慊而繼懷惟慘慘而情挽曠年載而不回長去君兮悠遠御飛龍之蜿蜒揚翠電之華旌絕紫霄而高騖飄弭節於天庭披輕雲而下觀覽九土之殊形顧南郢之邦壤咸蕪穢而倚傾驂盤桓而思服仰御驤以悲鳴紆予袂而收涕僕夫感以失聲履先王之正路豈淫徑之可遵知犯君之招咎恥干媚而求親顧旋復之無軏長自棄於遐濱與麋鹿以為群宿林藪之葳蓁野蕭條而極望曠千里而無人民生期於必死何自苦以終身寧作清水之沉泥不為濁路之飛塵踐蹊隧之危阻登岧嶢之高岑見失群之離獸覿偏棲之孤禽懷憤激以切痛苦回忍之在心愁戚戚其無為遊綠林而逍遙臨白水以悲嘯猿驚聽以失條亮無怨而棄逐乃余行之所招娛賓賦感夏日之炎景兮游曲觀之清涼遂衎賓而高會兮丹幃曄以四張辦中廚之豐膳兮作齊鄭之妍倡文人騁其妙說兮飛輕翰而成章談在昔之清風兮總賢聖之紀綱欣公子之高義兮德芬芳其若蘭揚仁恩於白屋兮踰周公之棄餐聽仁風以忘憂兮美酒清而肴乾愍志賦並序或人有好鄰人之女者時無良媒禮不成焉彼女遂行適人有言之於予者予心感焉乃作賦曰竊托音於往昔迄來春之不從思同遊而無路情壅隔而靡通哀莫哀於永絕悲莫悲於生離豈良時之難俟痛予質之日虧登高樓以臨下望所歡之攸居去君子之清宇歸小人之蓬廬欲輕飛而從之迫禮防之我居妾穢宗之陋女蒙日月之餘輝委薄軀於貴戚奉君子之裳衣歸思賦背故鄉而遷徂將遙憩乎他濱經平常之舊居感荒壞而莫振城邑寂以空虛草木穢而荊蓁嗟喬木之無陰處原野其何為信樂土之足慕忽並日之載馳靜思賦靜思賦夫何美女之爛妖紅顏曄而流光卓特出而無疋呈才好其莫當性通暢以聰惠行孊密而妍詳蔭高岑以翳日臨綠水之清流秋風起於中林離鳥鳴而相求愁慘慘以增傷悲予安能乎淹留
