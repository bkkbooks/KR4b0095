body:
  text: 卷六箜篌引箜篌引置酒高殿上親友從我遊中廚辦豐膳烹羊宰肥牛秦箏何慷慨齊瑟和且柔陽阿奏奇舞京洛出名謳樂飲過三爵緩帶傾庶羞主稱千金壽賓奉萬年酬久要不可忘薄終義所尤謙謙君子德磬折何所求驚風飄白日光景馳西流盛時不再來百年忽我遒生存華屋處零落歸山丘先民誰不死知命復何憂升天行二首乘蹻追術士遠之蓬萊山靈液飛素波蘭桂上參天玄豹游其下翔鵾戲其巔乘風忽登舉倣佛見衆仙扶桑之所出乃在朝陽溪中心陵蒼昊布葉蓋天涯日出登東幹既夕歿西枝願得紆陽轡回日使東馳仙人篇仙人攬六著對博太山隅湘娥拊琴瑟秦女吹笙竽玉樽盈桂酒河伯獻神魚四海一何局九州安所如韓終與王喬要我於天衢萬里不足步輕舉凌太虛飛騰踰景雲高風吹我軀回駕觀紫薇與帝合靈符閶闔正嵯峨雙闕萬丈餘玉樹扶道生白虎夾門樞驅風遊四海東過王母廬俯觀五嶽間人生如寄居潛光養羽翼進趨且徐徐不見軒轅氏乘龍出鼎湖徘徊九天上與爾長相須妾薄命二首攜玉手喜同車比上雲閣飛除釣臺蹇産清虛池塘觀沼可娛仰泛龍舟緑波俯擢神草枝柯想彼宓妃洛河退詠漢女湘娥日既逝矣西藏更會蘭室洞房華燈步障舒光皎若日出扶桑促樽合坐行觴主人起舞𥁲盤能者穴觸別端騰觚飛爵闌干同量等色齊顏任意交屬所歡朱顏發外形蘭袖隨禮容極情妙舞仙仙體輕裳解履遺絶纓俯仰笑喧無呈覽持佳人玉顏齊舉金爵翠盤手形羅袖良難腕弱不勝珠環坐者歎息舒顏御巾裛粉君傍中有霍納都梁雞舌五味雜香進者何人齊姜恩重愛深難忘召延親好宴私但歌杯來何遲客賦既醉言歸主人稱露未晞齊歌楚舞紛紛歌聲上徹青雲輜軿飛轂交輪還行秋殿層樓御輦從好仇入侍君王玉闥椒房丹帷楚組連綱白馬篇白馬篇白馬飾金羈連翩西北馳借問誰家子幽并遊俠兒少小去鄉邑揚聲沙漠垂宿昔秉良弓楛矢何參差控弦破左的右發摧月支仰手接飛猱俯身散馬蹄狡捷過猴猿勇剽若豹螭邊城多警急虜騎數遷移羽檄從北來厲馬登高堤長驅蹈胸奴左顧陵鮮卑棄身鋒刃端性命安可懷父母且不顧何言子與妻名在壯士籍不得中顧私捐軀赴國難視死忽如歸名都篇名都多妖女京洛出少年寶劍直千金被服麗且鮮鬭雞東郊道走馬長楸閒馳騁未能半雙兔過我前攬弓捷鳴鏑長驅上南山左挽因右發一縱兩禽連餘巧未及展仰手接飛鳶觀者咸稱善衆工歸我妍我歸宴平樂美酒斗十千膾鯉臇胎蝦炮鱉炙熊蹯鳴儔嘯匹侶列坐竟長筵連翩擊鞠壤巧捷惟萬端白日西南馳光景不可攀雲散還城邑清晨復來還薤露行天地無窮極陰陽轉相因人居一世間忽若風吹塵願得展功勤輸力於明君懷此王佐才慷慨獨不群鱗介尊神龍走獸宗麒麟蟲獸豈知德何況於士人孔氏刪詩書王業燦已分騁我徑寸翰流藻垂華芬豫章行窮達難豫圖禍福信亦然虞舜不逢堯耕耘處中田太公未遭文漁釣終渭川不見魯孔丘窮困陳蔡間周公下白屋天下稱其賢又鴛鴦自朋親不若比翼連他人雖同盟骨肉天性然周公穆康叔管蔡則流言子臧讓千乘季札慕其賢美女篇美女篇美女妖且間採桑歧路間柔條紛冉冉落葉何翩翩攘袖見素手皓腕約金環頭上金爵叉腰佩翠琅玕明珠交玉體珊瑚間木難羅衣何飄飄輕裾隨風還顧盻遺光彩長嘯氣若蘭行徒用息駕休者以忘餐借問女何居乃在城南端青樓臨大路高門結重關容華耀朝日誰不希令顏媒氏何所營玉帛不時安佳人慕高義求賢良獨難衆人徒嗷嗷安知彼所觀盛年處房室中夜起長歎艷歌出自薊北門遙望湖池桑枝枝自相植葉葉自相當長者賜顏色泰山可動移夏節純和天清涼百草滋殖舒蘭芳遊仙人生不滿百歲歲少歡娛意欲奮六翮排霧凌紫虛蟬蛻同松喬翻跡登鼎湖翱翔九天上騁轡遠行游東觀扶桑曜西臨弱水流北極登玄渚南翔陟丹丘五游五游九州不足步願得凌雲翔逍遙八紘外游目歷遐荒披我丹霞衣襲我素霓裳華蓋芳暗藹六龍仰天驤曜靈未移景倏忽造昊蒼閶闔啓丹扉雙闕曜朱光徘徊文昌殿登陟太微堂上帝休西櫺群后集東廂帶我瓊瑤佩漱我沆瀣漿踟蹰玩靈芝徙倚弄華芳王子奉仙藥羡門進奇方服食享遐紀延壽保無疆梁甫行梁甫行八方各異氣千里殊風雨劇哉邊海民寄身於草墅妻子像禽獸行止依林阻柴門何蕭條狐兔翔我宇丹霞蔽日行紂為昏亂虐殘忠正周室何隆一門三聖牧野致功天亦革命漢祚之興秦階之衰雖有南面王道陵夷炎光再幽殄滅無遺怨歌行為君既不易為臣良獨難忠信事不顯乃有見疑患周公佐文武金縢功不刊推心輔王室二叔反流言待罪居東國泫涕常流連皇靈大動變震雷風且寒拔樹偃秋稼天威不可干素服開金縢感悟求其端公旦事既顯成王乃哀嘆吾欲竟此曲此曲悲且長今日樂相樂別後莫相忘善哉行來日大難口燥唇乾今日相樂皆當喜歡經歷名山芝草翩翩仙人王喬奉藥一丸自惜袖短內手知寒慚無靈轍以救趙宣月沒參橫北斗闌干親友在門饑不及餐歡日尚少戚日苦多以何忘憂彈箏酒歌淮南八公要道不煩參駕六龍游戲雲端如彼翰鳥或飛戾天君子行君子防未然不處嫌疑間瓜田不納履李下不整冠周公下白屋吐哺不及餐一沐三握髮後人稱聖賢古樂府作古辭冠字下有四句云叔嫂不親授長幼不比肩勞謙得其柄和光甚獨難恐編者有誤故附此平陵東閶闔開天衢通被我羽衣乘飛龍乘飛龍與仙期東上蓬萊採靈芝靈芝採之可服食年若王父無終極苦思行緑蘿緣玉樹光耀燦相輝下有兩真人舉趐翻高飛我心何踊躍思欲攀雲追鬱鬱西嶽巔石室青與天連中有耆年一隱士鬚髮皆皓然策杖從我遊教我要忘言遠遊篇遠遊臨四海俯仰觀洪波大魚若曲陵承浪相經過靈鼇戴方丈神嶽儼嵯峨仙人翔其隅玉女戲其阿瓊蕊可療饑仰首吸朝霞崑崙本吾宅中州非我家將歸謁東父一舉超流沙鼓翼舞時風長嘯激清歌金石固易弊日月同光華齊年與天地萬乘安足多吁嗟篇吁嗟此轉蓬居世何獨然長去本根逝宿夜無休閒東西經七陌南北越九阡卒遇回風起吹我入雲間自謂終天路忽然下沉淵驚飆接我出故歸彼中田當南而更北謂東而反西宕若當何依忽亡而復存飄颻周八澤連翩歷五山流轉無恆處誰知吾苦艱願為中林草秋隨野火燔糜滅豈不痛願與株荄連蝦䱉篇蝦䱉游潢潦不知江海流燕雀戲藩柴安識鴻鵠游世士誠明性大德固無儔駕言登五嶽然後小陵丘俯觀上路人勢利是謀讎高念翼皇家遠懷柔九州撫劍而雷音猛氣縱橫浮泛泊徒嗷嗷誰知壯士憂種葛篇種葛南山下葛藟自成陰與君初婚時結髮恩義深歡愛在枕席宿昔同衣衾竊慕棠棣篇好樂和瑟琴行年將晚莫佳人懷異心恩紀曠不接我情遂抑沉出門當何顧徘徊步北林下有交頸獸仰見雙栖禽攀枝長歎息淚下沾羅襟良馬知我悲延頸代我吟昔為同池魚今為商與參往古皆歡遇我獨困於今棄置委天命悠悠安可任浮萍篇浮萍篇浮萍寄清水隨風東西流結髮辭嚴親來為君子仇恪勤在朝夕無端獲罪尤在昔蒙恩惠和樂如瑟琴何意今摧頽曠若商與參茱萸自有芳不若桂與蘭新人雖可愛不若故所歡行雲有反期君恩儻中還慊慊仰天歎愁心將何訴日月不恆處人生忽若寓悲風來入帷淚下如垂露散篋造新衣裁縫紈與素惟漢行太極定二儀清濁始以形三光照八極天道甚著明為人立君長欲以遂其生行仁章以瑞變故誡驕盈神高而聽卑報若響應聲明主敬細微三季瞢天經二皇稱至化盛哉唐虞庭禹湯繼厥德周亦致太平在昔懷帝京日昃不敢寧濟濟在公朝萬載馳其名當來日大難日苦短樂有餘乃置玉樽辦東廚廣情故心相於闔門置酒和樂欣欣遊馬後來轅車解輪今日同堂出門異鄉別易會難各盡杯觴野田黃雀行高樹多悲風海水揚其波利劍不在掌結友何須多不見籬間雀見鷂自投羅羅家得雀喜少年見雀悲拔劍捎羅網黃雀得飛飛飛飛摩蒼天來下謝少年門有萬里客門有萬里客問君何鄉人褰裳起從之果得心所親挽裳對我泣太息前自陳本是朔方士今為吳越民行行將復行去去適西秦怨歌行一首七解晉曲所奏明月照高樓流光正徘徊上有愁思婦悲嘆有餘哀一解借問嘆者誰自云宕子妻夫行踰十載賤妾常獨棲二解念君過於渴思君劇於飢君為高山柏妾為濁水泥三解北風行蕭蕭烈烈入吾耳心中念故人淚墮不能止四解浮沉各異路會合當何諧願作東北風吹我入君懷五解君懷常不開賤妾當何依恩情中道絶流止任東西六解我欲竟此曲此曲悲且長今日樂相樂別後莫相忘七解桂之樹行桂之樹桂之樹桂生一何麗佳楊朱華而翠葉流芳布天涯上有棲鸞下有盤螭桂之樹得道之真人咸來會講仙教爾服食日精要道甚省不煩淡泊無為自然乘蹻萬里之外去留隨意所欲存高高上際於衆外下下乃窮極地天當牆欲高行龍欲升天須浮雲人之仕進待中人衆口可以鑠金讒言三至慈母不親憤憤俗間不辨僞真願欲披心自說陳君門以九重道遠河無津當欲游南山行東海廣且深由卑下百川五嶽雖高大不逆垢與塵良木不十圍洪條無所因長者能博愛天下寄其身大匠無棄材船車用不均錐刀各異能何所獨卻前嘉善而矜愚大聖亦同然仁者各壽考四坐咸萬年當事君行人生有所貴尚出門各異情朱紫更相奪色雅鄭異音聲好惡隨所愛憎追舉逐名百心可事一君巧詐寧拙誠當車以駕行坐玉殿會諸貴客侍者行觴主人離席顧視東西箱絲竹與鞞鐸不醉無歸來明燈以繼夕飛龍篇晨遊太山雲霧窈窕忽逢二童顏色鮮好乘彼白鹿手翳芝草我知真人長跪問道西登玉堂金樓復道授我仙藥神皇所造教我服食還精補腦壽同金石永世難老芝蓋翩翩南經丹穴積陽所生煎石流礫品物無形盤石篇盤石山巔石飄颻澗底蓬我本泰山人何為客淮東蒹葭彌斥土林木無分重岸巖若崩缺湖水何洶洶蚌蛤被濱涯光彩如錦虹高波凌雲霄浮氣象螭龍鯨脊若丘陵鬚若山上松呼吸吞船欐澎濞戲中鴻方舟尋高價珍寶麗以通一舉必千里乘颸舉帆幢經危履險阻未知命所鍾常恐沈黃壚下與黿鱉同南極蒼梧野游盻窮九江中夜指參辰欲師當定從仰天長太息思想懷故邦乘桴何所志吁嗟我孔公驅車篇驅車撣駑馬東到奉高城神哉彼泰山五嶽專其名隆高貫雲霓嵯峨出太清周流二六候間置十二亭上有涌醴泉玉石揚華英東北望吳野西眺觀日精魂神所繫屬逝者感斯征王者以歸天效厥元功成歷代無不遵禮記有品程探策或長短唯德享利貞封者七十帝軒皇元獨靈餐霞漱沆瀣毛羽被身形發舉蹈虛廓徑庭升窈冥同壽東父年曠代永長生
